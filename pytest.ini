[pytest]
testpaths = mcp mcp/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    expensive: marks tests as expensive (high API cost, run manually with -m expensive)
    asyncio: marks tests as asyncio (handled by pytest-asyncio)
addopts = -v --tb=short -m "not expensive"
