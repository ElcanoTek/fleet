name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required by golangci-lint-action's only-new-issues option (reads the PR diff).
  pull-requests: read

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install gitleaks
        # Pin a specific gitleaks release and verify its checksum so the gate is
        # reproducible and can't be silently changed by an upstream re-tag. The
        # scan reads .gitleaks.toml (full default ruleset + path allowlist) and
        # .gitleaksignore (fingerprints of confirmed FAKE test fixtures) from the
        # repo root automatically.
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o "$tarball" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # Fails the job (exit 1) on any new/un-ignored secret; passes clean on the
        # current tree. A fresh checkout has no build artifacts, so the path
        # allowlist in .gitleaks.toml is just local-run robustness.
        run: gitleaks dir . --redact --exit-code 1

  go:
    name: Go build / vet / lint / test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Chat suites (internal/store, internal/httpapi) read FLEET_TEST_DATABASE_URL,
      # falling back to CHAT_TEST_DATABASE_URL. Sched suite (internal/sched/*,
      # internal/runner) reads DATABASE_URL. The chat and sched migration systems
      # both use a table named schema_migrations with INCOMPATIBLE schemas, so they
      # MUST point at separate databases. Both suites auto-migrate from an empty DB.
      FLEET_TEST_DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_chat_test?sslmode=disable
      CHAT_TEST_DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_chat_test?sslmode=disable
      DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_sched_test?sslmode=disable
      # The clientconfig tests self-resolve config/default, but point the binaries at
      # the in-repo bundle explicitly for any code path that reads it.
      FLEET_CLIENT_CONFIG_DIR: ${{ github.workspace }}/config/default

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: true

      - name: Install postgresql-client-18 (so pg_dump matches the server major)
        # The runner ships client 16; the postgres service is server 18, and
        # pg_dump refuses to dump a newer server ("server version mismatch"). Pull
        # the matching client from PGDG so the backup/restore round-trip test
        # (cmd/fleet-admin) runs for real. Best-effort: if the repo is unreachable
        # the step still succeeds and the test skips on the version mismatch (it is
        # written to skip, never fail, when client and server majors disagree).
        run: |
          set -x
          (sudo install -d /usr/share/postgresql-common/pgdg \
            && sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
                 -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            && echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
                 | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null \
            && sudo apt-get update -qq \
            && sudo apt-get install -y -qq postgresql-client-18) \
            || echo "could not install postgresql-client-18; round-trip test will skip on version mismatch"
          pg_dump --version || true

      - name: Create test databases
        run: |
          PGPASSWORD=fleet psql -h localhost -U fleet -d fleet -v ON_ERROR_STOP=1 \
            -c 'CREATE DATABASE fleet_chat_test;' \
            -c 'CREATE DATABASE fleet_sched_test;'

      - name: Disable podman so container sandbox tests self-skip
        # GitHub's ubuntu-latest runner ships podman, but building the ~1.3GB
        # default-bundle sandbox image (config/default/sandbox/Containerfile) per
        # unit-test run would dominate this fast lint/test job — the real sandbox
        # is exercised in the e2e-live job, which builds/pulls it. So the
        # podman-gated integration tests in internal/sandbox are skipped here by
        # masking podman. They gate on
        # exec.LookPath("podman"): when podman is absent they cleanly t.Skip,
        # but when present they attempt a real `podman pull` and t.Fatalf on
        # failure. Masking the binary makes LookPath fail so every container
        # test skips. The host-backend sandbox tests (bash/python3 via os/exec)
        # still run normally.
        run: |
          if command -v podman >/dev/null 2>&1; then
            sudo mv "$(command -v podman)" "$(command -v podman).disabled"
          fi
          if command -v podman >/dev/null 2>&1; then
            echo "podman still on PATH at $(command -v podman); failing" >&2
            exit 1
          fi
          echo "podman is not on PATH (container sandbox tests will skip)"

      - name: go build (release config — host executor must NOT be compiled in)
        # No fleet_host_executor tag: this is the shipped binary. It compile-checks
        # the release path, proving the unsandboxed host executor (host.go) is fenced
        # out and host_disabled.go's stub stands in (#159).
        run: go build ./...

      - name: go vet
        # Tagged so host.go (gated behind fleet_host_executor) is vetted too. Tests
        # + the host fixtures only compile with the tag.
        run: go vet -tags fleet_host_executor ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Repo .golangci.yml is the v2 schema (version: "2") and pins
          # run.go: "1.26.4". Pin the binary to the SAME version the repo config
          # is tuned against (see the header note in .golangci.yml) so CI and a
          # local `golangci-lint run` agree and the full gate never flaps on a
          # version bump.
          version: v2.12.2
          # FULL GATE: the lint backlog has been burned down to zero, so this
          # fails on ANY finding (not just new-vs-merge-base). only-new-issues is
          # intentionally removed/false. To keep it clean: fix the finding, or
          # add a //nolint with a reason (nolintlint enforces the reason).
          only-new-issues: false

      - name: go test
        # Tagged: compiles the host-mode fixtures + MockMode tests. The release
        # binary above is built untagged; here we exercise the full suite (#159).
        run: go test -p 1 -tags fleet_host_executor ./... -count=1

      - name: go test -race
        # fleet's correctness rests on in-process coordination (the worker pool,
        # SSE fan-out, single-owner DB leases, the admission semaphore). The race
        # detector is the gate for that whole class of bug; it reuses the same
        # Postgres service as the plain test step above.
        run: go test -race -p 1 -tags fleet_host_executor ./... -count=1

      - name: govulncheck (dependency CVEs)
        # Call-graph-aware scan of the (broad, fast-moving) dependency tree for
        # known vulnerabilities reachable from fleet's code. gosec covers SAST and
        # gitleaks covers secrets; nothing else gates on vulnerable dependencies.
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web lint / test / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Build
        run: npm run build

  playwright:
    name: Web e2e (Playwright, mocked)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    env:
      # The mocked e2e suite drives the REAL Next app but route-intercepts every
      # Go backend, so no chat-server / orchestrator / OpenRouter / Podman is
      # needed — it's fully deterministic. These throwaway secrets must be set at
      # build time (server components read AUTH_SIGNING_PUBKEY to render the
      # "Use Elcano email" button). At RUNTIME the mocked suite regenerates a
      # fresh Ed25519 keypair per run (see web/e2e/test-auth-key.ts) and
      # playwright.config.ts overrides AUTH_SIGNING_PUBKEY on the `next start`
      # webServer with that generated pubkey — so the value below only needs to
      # be a shape-valid throwaway pubkey for the build-step button render.
      CHAT_MOCK_MODE: '1'
      APP_SESSION_SECRET: e2e-session-secret-0123456789abcdef
      # TEST ONLY — throwaway Ed25519 pubkey, not used in any deployment.
      AUTH_SIGNING_PUBKEY: P8Lyn/xy8bS2SWcnPkg2kKiGBctyJZdEMMzNEixh0As=
      CHAT_SERVER_URL: http://127.0.0.1:18080
      CHAT_SERVER_TOKEN: e2e-shared-secret
      ORCHESTRATOR_SERVER_URL: http://127.0.0.1:18000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        # Production build; playwright.config.ts boots `next start` against it in
        # CI (CHAT_MOCK_MODE=1) so the suite validates the shipped bundle.
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  e2e-live:
    name: Web e2e (Playwright, live — real backend + sandbox)
    runs-on: ubuntu-latest
    # The full real stack: Postgres (service container), both Go listeners, SSE,
    # the scheduler + worker pool, and the REAL rootless-podman sandbox. ONLY the
    # LLM is stubbed — by the wire-compatible fake (cmd/fake-llm), reached via
    # OPENROUTER_BASE_URL. No OpenRouter spend, fully deterministic.

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # The boot script creates the fleet_e2e_chat + fleet_e2e_sched DBs on this
      # admin DSN (the service container's superuser has CREATEDB).
      E2E_DATABASE_DSN: postgres://fleet:fleet@127.0.0.1:5432/postgres?sslmode=disable
      # Sandbox image: pulled from GHCR when published (see publish-sandbox-image.yml),
      # else built locally from the default bundle (config/default/sandbox/Containerfile)
      # by the boot script. Resolved into FLEET_SANDBOX_IMAGE below.
      SANDBOX_IMAGE_GHCR: ghcr.io/elcanotek/sandbox:latest
      SANDBOX_IMAGE_LOCAL: localhost/fleet-sandbox:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Ensure podman + pasta + postgres client
        # ubuntu-latest already ships podman and the postgres client, but install
        # defensively so the job is robust to runner image changes. The boot
        # script can stand up its own cluster too, but here we use the service.
        #
        # pasta (passt) is the rootless network backend that maps the host into
        # the container as `host.containers.internal`. The native ACP e2e gate
        # (scripts/e2e-boot-server.sh → ensure_native_agent) needs the
        # in-container agent to reach the host-side fake LLM at that name; pasta
        # makes it reachable (verified), so install it explicitly rather than
        # relying on the runner image's default rootless backend.
        run: |
          sudo apt-get update -qq
          command -v podman >/dev/null 2>&1 || sudo apt-get install -y -qq podman
          command -v pasta  >/dev/null 2>&1 || sudo apt-get install -y -qq passt
          command -v psql   >/dev/null 2>&1 || sudo apt-get install -y -qq postgresql-client
          podman --version
          pasta --version 2>/dev/null | head -1 || true
          psql --version

      - name: Resolve sandbox image (pull from GHCR, else build locally)
        id: sandbox
        # PULL is preferred (the 1.3GB image is published by publish-sandbox-image.yml).
        # If the package isn't available yet (e.g. a PR before the first publish),
        # fall back to a LOCAL build from the default bundle
        # (config/default/sandbox/Containerfile) so the gate is green regardless.
        # GHCR pull is best-effort and unauthenticated for a public package;
        # private packages would need a login step, but the fallback build keeps
        # the job working.
        run: |
          set -euo pipefail
          if podman pull "$SANDBOX_IMAGE_GHCR" >/dev/null 2>&1; then
            echo "Pulled $SANDBOX_IMAGE_GHCR from GHCR"
            echo "image=$SANDBOX_IMAGE_GHCR" >> "$GITHUB_OUTPUT"
          else
            echo "GHCR pull failed/unavailable; building sandbox image locally from the default bundle"
            IMAGE_NAME="${SANDBOX_IMAGE_LOCAL%%:*}" scripts/build-sandbox-image.sh "${SANDBOX_IMAGE_LOCAL##*:}"
            echo "image=$SANDBOX_IMAGE_LOCAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Assert sandbox isolation invariants (always-on, real rootless podman)
        # The project's #1 non-negotiable invariant (AGENTS.md): every agent tool
        # call runs in the rootless-Podman sandbox, mapped via
        # `--userns=keep-id:uid=1000,gid=1000` with same-path `:z` workspace
        # mounts. Its regression tests live in internal/sandbox, but they
        # SELF-SKIP when run as root or with podman masked — which is exactly the
        # default PR lanes (the `go` job masks podman; a root `make test` trips the
        # euid guard). This e2e-live job is the ONLY always-on lane with a real,
        # non-root, rootless-podman sandbox, so run the invariant tests here.
        #
        # A SKIP is treated as a FAILURE: a silently-skipped invariant test is a
        # false green, which is the precise gap this lane closes (issue #34). We
        # require an explicit `--- PASS` for each named test and fail on any
        # `--- SKIP`. FLEET_SANDBOX_TEST_IMAGE points the tests at the SAME image
        # the live stack resolved (GHCR pull or local build), so the assertion
        # holds whether or not the published image was available.
        env:
          FLEET_SANDBOX_TEST_IMAGE: ${{ steps.sandbox.outputs.image }}
        run: |
          set -euo pipefail
          tests='TestContainerWorkspaceSamePathCoherence|TestContainerReadOnlyMountsSamePath|TestContainerWorkspaceSurvivesConcurrentMount|TestContainerBashSamePath'
          # -tags fleet_host_executor: these are container-mode invariant tests,
          # but they share the sandbox test package with the host-mode fixtures
          # that are now gated behind this tag (#159) — the package won't COMPILE
          # without it (the tests would read as "absent" and trip the guard below).
          go test -tags fleet_host_executor -run "$tests" -v -count=1 ./internal/sandbox 2>&1 | tee sandbox-invariants.log
          for tc in \
            TestContainerWorkspaceSamePathCoherence \
            TestContainerReadOnlyMountsSamePath \
            TestContainerWorkspaceSurvivesConcurrentMount \
            TestContainerBashSamePath; do
            if ! grep -q -- "--- PASS: ${tc}" sandbox-invariants.log; then
              echo "::error::sandbox invariant test ${tc} did not PASS (skipped or absent) — this always-on lane must actually run it (see issue #34)"
              exit 1
            fi
          done
          if grep -q -- '--- SKIP' sandbox-invariants.log; then
            echo "::error::a sandbox invariant test SKIPPED — this lane must run them for real (non-root rootless podman + resolved image), not self-skip into a false green"
            exit 1
          fi

      - name: Boot the live stack + run the live Playwright project
        working-directory: web
        env:
          CI: '1'
          E2E_LIVE: '1'
          E2E_PROD: '1'
          FLEET_SANDBOX_IMAGE: ${{ steps.sandbox.outputs.image }}
        # playwright.config.ts (E2E_LIVE=1) launches ../scripts/e2e-boot-server.sh
        # as its webServer; the script boots everything (health-gated, no sleeps),
        # then the "live" project runs against it.
        run: npx playwright test --project=live --reporter=list

      - name: Upload Playwright live report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-live-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload server logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-live-server-logs
          path: |
            .e2e-run/logs/
            web/test-results/
          retention-days: 14
          if-no-files-found: ignore
