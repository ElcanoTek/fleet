name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required by golangci-lint-action's only-new-issues option (reads the PR diff).
  pull-requests: read

jobs:
  changes:
    # Classify the PR (or push) as docs-only or not. The heavy jobs below gate on
    # this so a documentation-only change skips the ~1.3GB sandbox build and the
    # rest of the compile/test/e2e suite. FAIL-SAFE: docs_only is true only when
    # EVERY changed file matches the documentation allowlist; a single non-doc file
    # forces the full suite, and anything we can't classify also runs everything.
    # The gitleaks secret scan is intentionally NOT gated on this — a secret can be
    # pasted into a markdown file, so it runs on every change.
    name: Detect docs-only changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.detect.outputs.docs_only }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so the base/head (or before/after) SHAs are present to diff.
          fetch-depth: 0

      - name: Detect whether every changed file is documentation
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          PUSH_AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          case "$EVENT_NAME" in
            pull_request)
              range="${PR_BASE_SHA}...${PR_HEAD_SHA}" ;;
            push)
              # New branch / unknown base (all-zero SHA): can't diff, run everything.
              if [ -z "${PUSH_BEFORE}" ] || [ "${PUSH_BEFORE}" = "0000000000000000000000000000000000000000" ]; then
                echo "No usable base SHA for this push; running the full suite."
                echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0
              fi
              range="${PUSH_BEFORE}...${PUSH_AFTER}" ;;
            *)
              echo "Event '$EVENT_NAME' is not gated; running the full suite."
              echo "docs_only=false" >> "$GITHUB_OUTPUT"; exit 0 ;;
          esac

          files="$(git diff --name-only "$range")"
          echo "Changed files in ${range}:"
          printf '%s\n' "$files"

          docs_only=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # `*` in a shell case pattern spans '/', so these match at any depth.
            case "$f" in
              *.md|docs/*|LICENSE) : ;;        # documentation: no compiled/runtime signal
              *) docs_only=false ;;
            esac
          done <<< "$files"

          echo "docs_only=${docs_only}"
          echo "docs_only=${docs_only}" >> "$GITHUB_OUTPUT"

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install gitleaks
        # Pin a specific gitleaks release and verify its checksum so the gate is
        # reproducible and can't be silently changed by an upstream re-tag. The
        # scan reads .gitleaks.toml (full default ruleset + path allowlist) and
        # .gitleaksignore (fingerprints of confirmed FAKE test fixtures) from the
        # repo root automatically.
        env:
          GITLEAKS_VERSION: '8.30.1'
          GITLEAKS_SHA256: '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb'
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSL -o "$tarball" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # Fails the job (exit 1) on any new/un-ignored secret; passes clean on the
        # current tree. A fresh checkout has no build artifacts, so the path
        # allowlist in .gitleaks.toml is just local-run robustness.
        run: gitleaks dir . --redact --exit-code 1

  go:
    name: Go build / vet / lint / test
    runs-on: ubuntu-latest
    needs: changes
    # Skipped for a docs-only change; the `CI gate` job treats a skip as a pass.
    if: ${{ needs.changes.outputs.docs_only != 'true' }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # Chat suites (internal/store, internal/httpapi) read FLEET_TEST_DATABASE_URL,
      # falling back to CHAT_TEST_DATABASE_URL. Sched suite (internal/sched/*,
      # internal/runner) reads DATABASE_URL. The chat and sched migration systems
      # both use a table named schema_migrations with INCOMPATIBLE schemas, so they
      # MUST point at separate databases. Both suites auto-migrate from an empty DB.
      FLEET_TEST_DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_chat_test?sslmode=disable
      CHAT_TEST_DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_chat_test?sslmode=disable
      DATABASE_URL: postgres://fleet:fleet@localhost:5432/fleet_sched_test?sslmode=disable
      # The clientconfig tests self-resolve config/default, but point the binaries at
      # the in-repo bundle explicitly for any code path that reads it.
      FLEET_CLIENT_CONFIG_DIR: ${{ github.workspace }}/config/default

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: true

      - name: Install postgresql-client-18 (so pg_dump matches the server major)
        # The runner ships client 16; the postgres service is server 18, and
        # pg_dump refuses to dump a newer server ("server version mismatch"). Pull
        # the matching client from PGDG so the backup/restore round-trip test
        # (cmd/fleet-admin) runs for real. Best-effort: if the repo is unreachable
        # the step still succeeds and the test skips on the version mismatch (it is
        # written to skip, never fail, when client and server majors disagree).
        run: |
          set -x
          (sudo install -d /usr/share/postgresql-common/pgdg \
            && sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
                 -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            && echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
                 | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null \
            && sudo apt-get update -qq \
            && sudo apt-get install -y -qq postgresql-client-18) \
            || echo "could not install postgresql-client-18; round-trip test will skip on version mismatch"
          pg_dump --version || true

      - name: Create test databases
        run: |
          PGPASSWORD=fleet psql -h localhost -U fleet -d fleet -v ON_ERROR_STOP=1 \
            -c 'CREATE DATABASE fleet_chat_test;' \
            -c 'CREATE DATABASE fleet_sched_test;'

      - name: Disable podman so container sandbox tests self-skip
        # GitHub's ubuntu-latest runner ships podman, but building the ~1.3GB
        # default-bundle sandbox image (config/default/sandbox/Containerfile) per
        # unit-test run would dominate this fast lint/test job — the real sandbox
        # is exercised in the e2e-live job, which builds it. So the
        # podman-gated integration tests in internal/sandbox are skipped here by
        # masking podman. They gate on
        # exec.LookPath("podman"): when podman is absent they cleanly t.Skip,
        # but when present they need the local sandbox image
        # (localhost/fleet-sandbox:latest) and t.Fatalf if it is absent. Masking
        # the binary makes LookPath fail so every container test skips. The
        # host-backend sandbox tests (bash/python3 via os/exec) still run normally.
        run: |
          if command -v podman >/dev/null 2>&1; then
            sudo mv "$(command -v podman)" "$(command -v podman).disabled"
          fi
          if command -v podman >/dev/null 2>&1; then
            echo "podman still on PATH at $(command -v podman); failing" >&2
            exit 1
          fi
          echo "podman is not on PATH (container sandbox tests will skip)"

      - name: go build (release config — host executor must NOT be compiled in)
        # No fleet_host_executor tag: this is the shipped binary. It compile-checks
        # the release path, proving the unsandboxed host executor (host.go) is fenced
        # out and host_disabled.go's stub stands in (#159).
        run: go build ./...

      - name: go vet
        # Tagged so host.go (gated behind fleet_host_executor) is vetted too. Tests
        # + the host fixtures only compile with the tag.
        run: go vet -tags fleet_host_executor ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          # Repo .golangci.yml is the v2 schema (version: "2") and pins
          # run.go: "1.26.4". Pin the binary to the SAME version the repo config
          # is tuned against (see the header note in .golangci.yml) so CI and a
          # local `golangci-lint run` agree and the full gate never flaps on a
          # version bump.
          version: v2.12.2
          # FULL GATE: the lint backlog has been burned down to zero, so this
          # fails on ANY finding (not just new-vs-merge-base). only-new-issues is
          # intentionally removed/false. To keep it clean: fix the finding, or
          # add a //nolint with a reason (nolintlint enforces the reason).
          only-new-issues: false

      - name: go test
        # Tagged: compiles the host-mode fixtures + MockMode tests. The release
        # binary above is built untagged; here we exercise the full suite (#159).
        # -coverprofile / -covermode=atomic: emit coverage data for Codecov
        # (issue #249). The race step below is intentionally NOT instrumented —
        # `go tool cover` on this non-race profile is enough for trend tracking,
        # and -coverprofile under -race would double the already-long race run.
        run: go test -p 1 -tags fleet_host_executor -coverprofile=coverage.out -covermode=atomic ./... -count=1

      - name: go test -race
        # fleet's correctness rests on in-process coordination (the worker pool,
        # SSE fan-out, single-owner DB leases, the admission semaphore). The race
        # detector is the gate for that whole class of bug; it reuses the same
        # Postgres service as the plain test step above.
        run: go test -race -p 1 -tags fleet_host_executor ./... -count=1

      - name: Coverage summary
        # Print the project-total line to the log and emit an HTML report for
        # local-style inspection / artifact download. fail_ci_if_error is off on
        # the Codecov upload below, so this step is the durable in-log signal.
        run: |
          go tool cover -func=coverage.out | tail -1
          go tool cover -html=coverage.out -o coverage.html

      - name: Per-package coverage summary
        # Write the per-package (and per-function) coverage table to the Actions
        # job summary, visible in the UI without downloading any artifact (#249).
        run: |
          echo "## Go coverage by package" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          go tool cover -func=coverage.out >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage to Codecov
        # Codecov posts an inline PR comment showing which lines lost coverage,
        # adds a check to the PR, and maintains the historical trend. Thresholds
        # live in codecov.yml at the repo root. Requires the CODECOV_TOKEN repo
        # secret (Settings → Secrets → Actions). fail_ci_if_error is false so a
        # transient Codecov outage can't break the merge gate.
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          flags: go
          fail_ci_if_error: false

      - name: govulncheck (dependency CVEs)
        # Call-graph-aware scan of the (broad, fast-moving) dependency tree for
        # known vulnerabilities reachable from fleet's code. gosec covers SAST and
        # gitleaks covers secrets; nothing else gates on vulnerable dependencies.
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  web:
    name: Web lint / test / build
    runs-on: ubuntu-latest
    needs: changes
    # Skipped for a docs-only change; the `CI gate` job treats a skip as a pass.
    if: ${{ needs.changes.outputs.docs_only != 'true' }}
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (vitest)
        run: npx vitest run

      - name: Build
        run: npm run build

  playwright:
    name: Web e2e (Playwright, mocked)
    runs-on: ubuntu-latest
    needs: changes
    # Skipped for a docs-only change; the `CI gate` job treats a skip as a pass.
    if: ${{ needs.changes.outputs.docs_only != 'true' }}
    defaults:
      run:
        working-directory: web

    env:
      # The mocked e2e suite drives the REAL Next app but route-intercepts every
      # Go backend, so no chat-server / orchestrator / OpenRouter / Podman is
      # needed — it's fully deterministic. These throwaway secrets must be set at
      # build time (server components read AUTH_SIGNING_PUBKEY to render the
      # "Use Elcano email" button). At RUNTIME the mocked suite regenerates a
      # fresh Ed25519 keypair per run (see web/e2e/test-auth-key.ts) and
      # playwright.config.ts overrides AUTH_SIGNING_PUBKEY on the `next start`
      # webServer with that generated pubkey — so the value below only needs to
      # be a shape-valid throwaway pubkey for the build-step button render.
      CHAT_MOCK_MODE: '1'
      APP_SESSION_SECRET: e2e-session-secret-0123456789abcdef
      # TEST ONLY — throwaway Ed25519 pubkey, not used in any deployment.
      AUTH_SIGNING_PUBKEY: P8Lyn/xy8bS2SWcnPkg2kKiGBctyJZdEMMzNEixh0As=
      CHAT_SERVER_URL: http://127.0.0.1:18080
      CHAT_SERVER_TOKEN: e2e-shared-secret
      ORCHESTRATOR_SERVER_URL: http://127.0.0.1:18000

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build
        # Production build; playwright.config.ts boots `next start` against it in
        # CI (CHAT_MOCK_MODE=1) so the suite validates the shipped bundle.
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 14

  e2e-live:
    name: Web e2e (Playwright, live — real backend + sandbox)
    runs-on: ubuntu-latest
    needs: changes
    # Skipped for a docs-only change; the `CI gate` job treats a skip as a pass.
    if: ${{ needs.changes.outputs.docs_only != 'true' }}
    # The full real stack: Postgres (service container), both Go listeners, SSE,
    # the scheduler + worker pool, and the REAL rootless-podman sandbox. ONLY the
    # LLM is stubbed — by the wire-compatible fake (cmd/fake-llm), reached via
    # OPENROUTER_BASE_URL. No OpenRouter spend, fully deterministic.

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: fleet
          POSTGRES_PASSWORD: fleet
          POSTGRES_DB: fleet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fleet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # The boot script creates the fleet_e2e_chat + fleet_e2e_sched DBs on this
      # admin DSN (the service container's superuser has CREATEDB).
      E2E_DATABASE_DSN: postgres://fleet:fleet@127.0.0.1:5432/postgres?sslmode=disable
      # Sandbox image: built locally from the default client bundle
      # (config/default/sandbox/Containerfile, a vanilla fedora-minimal base) by
      # the step below and resolved into FLEET_SANDBOX_IMAGE. fleet's core pulls
      # no vendor-published image; the per-client registry-publish path is opt-in
      # from a client's own bundle repo (see internal/clientconfig Sandbox()).
      SANDBOX_IMAGE_LOCAL: localhost/fleet-sandbox:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          check-latest: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser (chromium)
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Ensure podman + pasta + postgres client
        # ubuntu-latest already ships podman and the postgres client, but install
        # defensively so the job is robust to runner image changes. The boot
        # script can stand up its own cluster too, but here we use the service.
        #
        # pasta (passt) is the rootless network backend for the per-turn podman
        # tool sandbox; install it explicitly rather than relying on the runner
        # image's default rootless backend.
        run: |
          sudo apt-get update -qq
          command -v podman >/dev/null 2>&1 || sudo apt-get install -y -qq podman
          command -v pasta  >/dev/null 2>&1 || sudo apt-get install -y -qq passt
          command -v psql   >/dev/null 2>&1 || sudo apt-get install -y -qq postgresql-client
          podman --version
          pasta --version 2>/dev/null | head -1 || true
          psql --version

      - name: Build the sandbox image from the default bundle
        id: sandbox
        # fleet's core depends on NO vendor-published sandbox image: build the
        # generic default-bundle flavor on the runner from
        # config/default/sandbox/Containerfile (a vanilla fedora-minimal base),
        # exactly as a deployment box does. The ~1.3GB build is the cost of a
        # self-contained, registry-independent gate. A client that prefers a
        # prebuilt image publishes it from its own bundle repo and sets
        # sandbox.image in its manifest — that path is out of scope for core CI.
        run: |
          set -euo pipefail
          IMAGE_NAME="${SANDBOX_IMAGE_LOCAL%%:*}" scripts/build-sandbox-image.sh "${SANDBOX_IMAGE_LOCAL##*:}"
          echo "image=$SANDBOX_IMAGE_LOCAL" >> "$GITHUB_OUTPUT"

      - name: Assert sandbox isolation invariants (always-on, real rootless podman)
        # The project's #1 non-negotiable invariant (AGENTS.md): every agent tool
        # call runs in the rootless-Podman sandbox, mapped via
        # `--userns=keep-id:uid=1000,gid=1000` with same-path `:z` workspace
        # mounts. Its regression tests live in internal/sandbox, but they
        # SELF-SKIP when run as root or with podman masked — which is exactly the
        # default PR lanes (the `go` job masks podman; a root `make test` trips the
        # euid guard). This e2e-live job is the ONLY always-on lane with a real,
        # non-root, rootless-podman sandbox, so run the invariant tests here.
        #
        # A SKIP is treated as a FAILURE: a silently-skipped invariant test is a
        # false green, which is the precise gap this lane closes (issue #34). We
        # require an explicit `--- PASS` for each named test and fail on any
        # `--- SKIP`. FLEET_SANDBOX_TEST_IMAGE points the tests at the SAME image
        # the live stack uses (the locally-built default-bundle sandbox), so the
        # assertion runs against the real rootless-podman image.
        env:
          FLEET_SANDBOX_TEST_IMAGE: ${{ steps.sandbox.outputs.image }}
        run: |
          set -euo pipefail
          tests='TestContainerWorkspaceSamePathCoherence|TestContainerReadOnlyMountsSamePath|TestContainerWorkspaceSurvivesConcurrentMount|TestContainerBashSamePath'
          # -tags fleet_host_executor: these are container-mode invariant tests,
          # but they share the sandbox test package with the host-mode fixtures
          # that are now gated behind this tag (#159) — the package won't COMPILE
          # without it (the tests would read as "absent" and trip the guard below).
          go test -tags fleet_host_executor -run "$tests" -v -count=1 ./internal/sandbox 2>&1 | tee sandbox-invariants.log
          for tc in \
            TestContainerWorkspaceSamePathCoherence \
            TestContainerReadOnlyMountsSamePath \
            TestContainerWorkspaceSurvivesConcurrentMount \
            TestContainerBashSamePath; do
            if ! grep -q -- "--- PASS: ${tc}" sandbox-invariants.log; then
              echo "::error::sandbox invariant test ${tc} did not PASS (skipped or absent) — this always-on lane must actually run it (see issue #34)"
              exit 1
            fi
          done
          if grep -q -- '--- SKIP' sandbox-invariants.log; then
            echo "::error::a sandbox invariant test SKIPPED — this lane must run them for real (non-root rootless podman + resolved image), not self-skip into a false green"
            exit 1
          fi

      - name: Boot the live stack + run the live Playwright project
        working-directory: web
        env:
          CI: '1'
          E2E_LIVE: '1'
          E2E_PROD: '1'
          FLEET_SANDBOX_IMAGE: ${{ steps.sandbox.outputs.image }}
        # playwright.config.ts (E2E_LIVE=1) launches ../scripts/e2e-boot-server.sh
        # as its webServer; the script boots everything (health-gated, no sleeps),
        # then the "live" project runs against it.
        run: npx playwright test --project=live --reporter=list

      - name: Upload Playwright live report
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-live-report
          path: web/playwright-report/
          retention-days: 14

      - name: Upload server logs on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-live-server-logs
          path: |
            .e2e-run/logs/
            web/test-results/
          retention-days: 14
          if-no-files-found: ignore

  grype-scan:
    name: Container image vulnerability scan (Grype)
    runs-on: ubuntu-latest
    needs: [e2e-live]  # runs after e2e-live succeeds (which already builds the image)
    # When e2e-live is skipped for a docs-only change, this job is skipped too
    # (a job that `needs` a skipped job is itself skipped); the `CI gate` job
    # treats a skip as a pass, so docs-only PRs are not blocked.
    permissions:
      # Least-privilege: only this job can write SARIF to the Security tab.
      contents: read
      security-events: write
    env:
      SANDBOX_IMAGE_LOCAL: localhost/fleet-sandbox:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Grype
        # Pin a specific Grype release and verify its checksum, exactly as the
        # gitleaks gate above pins its binary: the scanner is part of the merge
        # gate, so its OWN supply chain matters as much as what it scans. We run
        # the pinned, checksum-verified upstream binary — NOT a third-party
        # composite action on a mutable @master ref — so an upstream re-tag can't
        # silently change what runs in the gate. Bump GRYPE_VERSION + GRYPE_SHA256
        # together (the checksum is published as grype_<ver>_checksums.txt).
        #
        # Why Grype and not Trivy: the sandbox base is fedora-minimal, and Trivy
        # has no Fedora advisory feed — it detects the OS but scans 0 of the ~400
        # RPMs ("WARN Unsupported os family=fedora"), which would be a false-green
        # gate. Grype matches the image's RPM AND Python packages against NVD/GHSA,
        # so it actually covers this image. See docs/TESTING.md for the rationale.
        env:
          GRYPE_VERSION: '0.115.0'
          GRYPE_SHA256: '3fad92940650e514c0aa2dad83526942a055e210cec09a8a59d9c024adc2b90e'
        run: |
          set -euo pipefail
          tarball="grype_${GRYPE_VERSION}_linux_amd64.tar.gz"
          curl -sSL -o "$tarball" \
            "https://github.com/anchore/grype/releases/download/v${GRYPE_VERSION}/${tarball}"
          echo "${GRYPE_SHA256}  ${tarball}" | sha256sum -c -
          tar -xzf "$tarball" grype
          sudo install -m 0755 grype /usr/local/bin/grype
          grype version

      - name: Ensure podman
        # The sandbox image is built with podman (scripts/build-sandbox-image.sh);
        # ubuntu-latest ships podman, but install defensively so the job is robust
        # to runner image changes (mirrors the e2e-live job's approach).
        run: |
          sudo apt-get update -qq
          command -v podman >/dev/null 2>&1 || sudo apt-get install -y -qq podman
          podman --version

      - name: Build the sandbox image and export it to an archive
        # Rebuilds the same default-bundle sandbox image the e2e-live job builds
        # (config/default/sandbox/Containerfile, a vanilla fedora-minimal base),
        # then `podman save`s it to a docker-archive tarball. Scanning the archive
        # (grype docker-archive:...) needs no running container daemon or socket —
        # hermetic and robust. This is a separate runner with a cold podman store
        # (GitHub shares no layer cache between jobs), so it is a full rebuild —
        # the ~1.3GB build is the cost of a self-contained, registry-independent
        # gate. govulncheck covers Go module CVEs; it cannot see the ~400 RPMs (and the
        # Python packages they ship) this image installs via microdnf — that
        # surface is what this scan covers.
        run: |
          set -euo pipefail
          IMAGE_NAME="${SANDBOX_IMAGE_LOCAL%%:*}" scripts/build-sandbox-image.sh "${SANDBOX_IMAGE_LOCAL##*:}"
          podman save --format docker-archive -o sandbox-image.tar "$SANDBOX_IMAGE_LOCAL"

      - name: Scan the sandbox image (fail on a fixable CRITICAL)
        # --fail-on critical: a CRITICAL CVE fails the job (exit 2); fixed HIGH/
        #   MEDIUM/LOW are recorded in the SARIF upload but do not block the PR.
        # --only-fixed: only a CVE WITH an available fix is considered, so this
        #   per-PR scan neither blocks on NOR reports an unfixed CVE — --only-fixed
        #   filters the whole match set, the SARIF included. An unfixed CVE is not
        #   actionable now, and blocking on it would just noise the gate (the most
        #   common cause of false-positive scanner failures); the weekly
        #   grype-scheduled.yml scan omits --only-fixed and surfaces unfixed CVEs
        #   to the Security tab. Accepted CVEs are suppressed in .grype.yaml (Grype
        #   auto-reads it from the repo root; one `ignore:` entry per CVE, with a
        #   rationale). The table output is for the CI log; the SARIF is uploaded.
        run: |
          set -euo pipefail
          grype "docker-archive:sandbox-image.tar" \
            --only-fixed \
            --fail-on critical \
            --output table \
            --output sarif=grype-results.sarif

      - name: Upload Grype SARIF results to the GitHub Security tab
        # Upload whenever the scan produced a SARIF — including when grype exited
        # non-zero on a fixable CRITICAL (it writes the file before exiting), so
        # findings reach GitHub Security → Code scanning with full CVE details,
        # affected packages, and fix versions rather than only a red CI job. The
        # hashFiles guard skips this step (instead of erroring "file not found")
        # when an EARLIER step failed before grype could write the SARIF.
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ !cancelled() && hashFiles('grype-results.sarif') != '' }}
        with:
          sarif_file: 'grype-results.sarif'
          category: 'grype-sandbox-image'

  ci-gate:
    # The SINGLE required status check on `main` (see .github/CODEOWNERS). It
    # `needs` every other job and ALWAYS runs, so it always reports a result —
    # which is what lets docs-only PRs (whose heavy jobs are skipped) merge
    # without being blocked forever on a required check that never reported, the
    # classic footgun of pairing required checks with path/`if` skips. A code PR
    # cannot go green here unless every upstream job actually succeeded: a skip is
    # allowed (docs-only), but any failure or cancellation fails the gate.
    name: CI gate
    if: ${{ always() }}
    needs: [changes, gitleaks, go, web, playwright, e2e-live, grype-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Require all upstream jobs to have succeeded or been skipped
        env:
          # needs.*.result is one of: success | failure | cancelled | skipped.
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          echo "Upstream job results: ${RESULTS}"
          case ",${RESULTS}," in
            *,failure,*|*,cancelled,*)
              echo "::error::A required upstream CI job failed or was cancelled."
              exit 1 ;;
          esac
          echo "All required CI jobs passed (or were cleanly skipped for a docs-only change)."
