# Dependabot keeps fleet's three dependency surfaces patched: the Go module
# at the repo root, the Next.js web app under /web, and the GitHub Actions
# used by the CI workflows. Minor + patch bumps are grouped per ecosystem so
# routine updates land as one PR instead of a flood; majors stay separate so
# breaking changes get their own review.
#
# Supply-chain cooldown: the gomod and npm surfaces carry a `cooldown` block so
# Dependabot waits a few days before opening a PR for a freshly published
# release. This is a deliberate defense against fast typosquat / account-takeover
# attacks, where a compromised version is published and then yanked once the
# ecosystem flags it — by the time Dependabot proposes the bump, that window has
# usually closed. It matters most for patch bumps, which the auto-merge workflow
# (`.github/workflows/auto-merge-dependabot.yml`) merges on its own once CI is
# green: the cooldown keeps a minutes-old patch from being proposed (and thus
# auto-merged) before the ecosystem has had a chance to scrutinize it. Cooldown
# applies to version updates only, never to Dependabot security updates, so
# urgent CVE fixes are not delayed.
#
# Schema (key `cooldown`, integer `*-days` sub-keys; supported for gomod and npm;
# applies to version updates only):
#   https://docs.github.com/code-security/reference/supply-chain-security/dependabot-options-reference#cooldown--
version: 2

updates:
  # Go module (go.mod / go.sum at the repo root).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Wait before proposing freshly published releases (see header). Patch is the
    # tightest gate because auto-merge-dependabot.yml auto-merges patch bumps.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    commit-message:
      prefix: "deps(go)"
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # Next.js web app (web/package.json + web/package-lock.json).
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Same supply-chain cooldown as gomod (see header).
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    commit-message:
      prefix: "deps(web)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # eslint 10+ is blocked UPSTREAM, not by us: eslint-config-next (Next 16)
      # pins eslint-plugin-import / eslint-plugin-jsx-a11y to peer eslint "<=9",
      # so adopting eslint 10 breaks `npm ci` / the lint job. Hold at 9.x (minor +
      # patch still flow) until the Next.js eslint plugins declare eslint >=10
      # support, then drop this ignore and take the major deliberately.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  # GitHub Actions referenced by .github/workflows/*.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(actions)"
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
