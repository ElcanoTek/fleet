openapi: 3.1.0
info:
  title: fleet orchestrator API
  version: "1.0.0"
  description: |
    HTTP API for the fleet **orchestrator** (the scheduling engine): node
    registration, scheduled-task lifecycle, API-key administration, the notes
    wiki, run logs, dashboard stats, and auth.

    This document is generated by hand but **kept honest by a CI test**:
    `cmd/fleet/openapi_drift_test.go` walks the real chi router
    (`buildOrchestratorMux`) and fails the build if the set of
    `{method, path}` here ever drifts from the shipped routes, and if any
    operation references a security scheme not defined below.

    A second gate (`TestOpenAPISchemaDrift`) statically cross-checks the reusable
    `components.schemas.*` against their backing Go models via reflection: every
    documented property must exist as a json field on the model, every `required:`
    field must exist and not be `omitempty`, and scalar types must agree. It does
    NOT verify status codes, runtime population, or inline (anonymous, non-`$ref`)
    operation bodies — those remain documentary. Undocumented model fields are
    surfaced as test warnings, not failures. See the test's block comment for the
    exact scope and its limits.

    The interactive chat HTTP/SSE API (`internal/httpapi`) is a separate surface
    and is not described here.

servers:
  - url: /
    description: The orchestrator listener (same origin as the dashboard).

components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: The configured admin API key (full access).
    scopedApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: A scoped (non-admin) API key; access limited to its scopes.
    nodeApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: A registered worker node's API key (node lease/report endpoints).
    registrationToken:
      type: apiKey
      in: header
      name: X-Registration-Token
      description: The node-registration bootstrap token.
    bearerToken:
      type: http
      scheme: bearer
      description: "A user token from the username/password login path (Authorization: Bearer)."
    elcanoAuthCookie:
      type: apiKey
      in: cookie
      name: elcano_auth
      description: The Elcano unified-auth Ed25519-signed identity cookie (scoped-user tier).

  schemas:
    ErrorResponse:
      type: object
      properties:
        detail: { type: string, description: "Human-readable error message (the handler's writeError body)." }
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
    MCPChoice:
      type: object
      properties:
        server: { type: string }
        account: { type: string }
      required: [server]
    MCPSelection:
      type: array
      items: { $ref: "#/components/schemas/MCPChoice" }
    CostRange:
      type: object
      properties:
        min: { type: number }
        max: { type: number }
    ModelPrice:
      type: object
      properties:
        input_per_m: { type: number, description: "USD per 1M input (prompt) tokens" }
        output_per_m: { type: number, description: "USD per 1M output (completion) tokens" }
    CostForecast:
      type: object
      description: >
        Pre-submission cost forecast for a scheduled task (#233). All cost fields
        are null when the model's pricing is unknown; the token estimates are
        still populated. Advisory only — the forecast never gates task creation.
      properties:
        model: { type: string }
        estimated_prompt_tokens: { type: integer }
        system_prompt_tokens: { type: integer }
        tool_definitions_tokens: { type: integer }
        avg_output_tokens: { type: integer }
        max_iterations: { type: integer }
        pricing_known: { type: boolean }
        per_iteration_cost_usd: { type: number, nullable: true }
        estimated_total_cost_usd: { type: number, nullable: true }
        estimated_total_cost_range: { allOf: [{ $ref: "#/components/schemas/CostRange" }], nullable: true }
        max_cost_ceiling_usd: { type: number }
        would_hit_ceiling: { type: boolean }
        price: { allOf: [{ $ref: "#/components/schemas/ModelPrice" }], nullable: true }
        note: { type: string }
    TaskCreate:
      type: object
      properties:
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        instruction_self_improve: { type: boolean }
        allow_network: { type: boolean, default: false, description: "Allow this scheduled task's execution sandbox outbound network egress. Default false seals it with --network=none, matching the interactive lockdown path." }
        allow_task_creation: { type: boolean, default: false, description: "Grant this task's SCHEDULED runs the built-in create_task tool so they can enqueue follow-up tasks. Default false: the tool is never registered, so interactive/unprivileged runs cannot self-schedule (no privilege escalation)." }
        allow_recurring_task_creation: { type: boolean, default: false, description: "Stricter, separately-toggled grant that additionally lets create_task set a cron recurrence on a spawned task. Meaningless without allow_task_creation; default false." }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string, description: "5-field cron expression" }
        files: { type: array, items: { type: string } }
      required: [prompt]
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        allow_network: { type: boolean, description: "Whether this task's execution sandbox is allowed outbound network egress (default false = sealed)." }
        status: { type: string, enum: [scheduled, pending, running, completed, failed, cancelled] }
        created_at: { type: string, format: date-time }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string }
        result: { type: string }
        error_message: { type: string }
        files: { type: array, items: { type: string } }
        created_by: { type: string, format: uuid }
        workspace_path: { type: string, description: "Host filesystem path of the per-run workspace directory the agent wrote into (#287). Present once the run begins; absent for tasks that never ran." }
        allow_task_creation: { type: boolean, description: "Whether this task's scheduled runs may enqueue follow-up tasks via create_task (default false)." }
        allow_recurring_task_creation: { type: boolean, description: "Whether create_task may set a cron recurrence on a task this one spawns (default false)." }
        created_by_task_id: { type: string, format: uuid, description: "The task whose scheduled run spawned this one via create_task. Set server-side for lineage/audit; null for tasks not spawned by a task." }
      required: [id, prompt, status]
    WorkspaceEntry:
      type: object
      properties:
        name: { type: string, description: "Slash-joined path relative to the workspace root; directories carry a trailing slash." }
        size_bytes: { type: integer, format: int64 }
        modified_at: { type: string, format: date-time }
        is_dir: { type: boolean }
      required: [name, size_bytes, modified_at, is_dir]
    WorkspaceListing:
      type: object
      properties:
        files: { type: array, items: { $ref: "#/components/schemas/WorkspaceEntry" } }
        workspace_path: { type: string, description: "The resolved workspace root the listing is rooted at." }
        truncated: { type: boolean, description: "True when the listing was capped (very large workspace)." }
      required: [files, workspace_path]
    NodeRegistration:
      type: object
      properties:
        hostname: { type: string }
        name: { type: string, description: "Optional display name; defaults to hostname." }
        os_type: { type: string }
      required: [hostname]
    Node:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        last_heartbeat: { type: string, format: date-time }
    APIKeyCreate:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
        allowed_node_patterns: { type: array, items: { type: string }, description: "Scope patterns limiting the key's task/node visibility." }
        rate_limit: { type: integer }
        expires_in_days: { type: integer }
        description: { type: string }
        max_cost_per_day_usd: { type: number, description: "Daily spend cap in USD (omit for unlimited)." }
        max_cost_per_month_usd: { type: number, description: "Monthly spend cap in USD (omit for unlimited)." }
      required: [name]
    APIKeyCreated:
      type: object
      description: "The created key's metadata (the embedded APIKeyResponse) plus the one-time plaintext api_key."
      properties:
        api_key: { type: string, description: "The plaintext key — shown ONCE at creation." }
        key_id: { type: string }
        name: { type: string }
        key_prefix: { type: string }
        allowed_node_patterns: { type: array, items: { type: string } }
        permissions: { type: array, items: { type: string } }
        rate_limit: { type: integer }
        created_at: { type: string, format: date-time }
        enabled: { type: boolean }
        description: { type: string }
    UserCreate:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
      required: [username, password]
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/UserResponse" }
    DashboardStats:
      type: object
      properties:
        total_nodes: { type: integer }
        active_nodes: { type: integer }
        idle_nodes: { type: integer }
        offline_nodes: { type: integer }
        pending_tasks: { type: integer }
        running_tasks: { type: integer }
        completed_tasks_today: { type: integer }
        failed_tasks_today: { type: integer }
    LogSession:
      type: object
      description: A captain's-log session (the recorded transcript of one task run).
    SLAReport:
      type: object
      description: >-
        The GET /sla-report response (#274): per-bucket SLA actuals over a
        window. The bucket key is the task's prompt (fleet has no separate
        `name` column).
      properties:
        period: { type: string, description: "Human label, e.g. last_7_days." }
        window_days: { type: integer, description: "Numeric window bound (1–90)." }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/SLAReportTask" }
      required: [period, window_days, tasks]
    SLAReportTask:
      type: object
      description: One row of the SLA report (#274).
      properties:
        task_name: { type: string }
        expected_minutes: { type: integer }
        p50_actual_minutes: { type: number }
        p95_actual_minutes: { type: number }
        breach_rate_pct: { type: number }
        sample_count: { type: integer }
      required: [task_name, expected_minutes, p50_actual_minutes, p95_actual_minutes, breach_rate_pct, sample_count]

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

paths:
  /health:
    get:
      summary: Liveness check.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /metrics:
    get:
      summary: Prometheus metrics (text exposition format). Admin-API-key gated.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string }
  /api/config:
    get:
      summary: Public dashboard config (branding, feature flags).
      security: []
      responses:
        "200": { description: OK }

  /register:
    post:
      summary: Register a worker node. (Internal single-host lease plumbing — fleet runs ONE synthetic worker node in-process; this is not a multi-runner feature.)
      security: [{ registrationToken: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeRegistration" }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "401": { $ref: "#/components/responses/Error" }

  /nodes:
    get:
      summary: List nodes.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Node" } }
  /nodes/{node_id}:
    parameters:
      - name: node_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a node.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Unregister a node.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Deleted }
        "401": { $ref: "#/components/responses/Error" }
  /nodes/heartbeat:
    post:
      summary: Node heartbeat (worker lease protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Error" }

  /tasks:
    get:
      summary: List tasks.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
    post:
      summary: Create (schedule) a task.
      description: Authenticated in-handler — accepts an admin key, a scoped key, a user bearer token, or the Elcano cookie.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/estimate:
    post:
      summary: Pre-submission cost forecast for a task.
      description: >
        Same request body as POST /tasks, but returns a token + cost forecast
        and creates nothing. Pure local computation (no model call). Returns 200
        with cost fields populated for a model whose pricing is known, or 202
        with null cost fields and an explanatory note when the model's pricing is
        unknown. Same authentication and rate limiter as POST /tasks.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Forecast (model pricing known)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostForecast" }
        "202":
          description: Forecast with null cost fields (model pricing unknown)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostForecast" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/tags:
    get:
      summary: List the distinct task tags in use with per-tag task counts (busiest first).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag: { type: string }
                    task_count: { type: integer }
  /tasks/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      summary: Update a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Cancel a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: Cancelled }
  /tasks/{task_id}/tags:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Atomically add and/or remove tags on a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                add: { type: array, items: { type: string } }
                remove: { type: array, items: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/rerun:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Re-run a task once now (a new task copied from this one, optional overrides).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                overrides:
                  type: object
                  properties:
                    prompt: { type: string }
                    model: { type: string }
                    fallback_model: { type: string }
                    max_iterations: { type: integer }
                    priority: { type: integer }
                    runtime_flavor: { type: string }
                    allow_network: { type: boolean }
                    description: { type: string }
                    tags: { type: array, items: { type: string } }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/clone:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Clone a task (a new task copied from this one, preserving recurrence; optional overrides).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                overrides:
                  type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/stream:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Stream a task's run log live (SSE).
      description: >
        Server-Sent Events stream of the task's run log. While the task is in flight
        the in-memory event buffer is tailed live, with Last-Event-ID replay on
        reconnect; once the task has finished the persisted log is replayed one-shot.
        Event types: agent_message, tool_call, tool_result, and a terminal status.
        Same auth + ownership gate as GET /logs/{task_id}.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: An SSE stream of run-log events.
          content:
            text/event-stream:
              schema: { type: string }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/workspace:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List (or ZIP-export) the files an agent created in a completed task's workspace.
      description: >
        Lists the files the task's agent wrote into its per-run workspace directory
        (reports, data, code, charts). Access is restricted to the admin or the
        task's creator (the creating user or API key) — strictly more than ordinary
        task visibility, because workspace files are private artifacts. Only available
        for completed tasks (success/error); a running task's workspace is mid-write.
        With ?format=zip the entire workspace is streamed as a ZIP archive (capped at
        FLEET_WORKSPACE_DOWNLOAD_MAX_BYTES total uncompressed size, default 50 MiB).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      parameters:
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [zip] }
          description: When "zip", stream the whole workspace as a ZIP archive instead of the JSON listing.
      responses:
        "200":
          description: The workspace listing (JSON), or the ZIP archive when ?format=zip.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceListing" }
            application/zip:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/workspace/*:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Download a single file from a completed task's workspace.
      description: >
        Streams one file from the task's per-run workspace as an attachment. The
        trailing path is interpreted relative to the workspace root and is guarded
        against traversal (".."/absolute/NUL paths are rejected; symlinks that escape
        the workspace root are not followable). Access is restricted to the admin or
        the task's creator. A file larger than FLEET_WORKSPACE_DOWNLOAD_MAX_BYTES
        (default 50 MiB) returns 413 and must be fetched via the CLI.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: The file contents, as an attachment.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /tasks/pending:
    get:
      summary: Lease the next pending task (worker protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200":
          description: A task to run, or empty.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /tasks/cleanup:
    post:
      summary: Cleanup completed/old task history.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
  /tasks/model:
    post:
      summary: Bulk re-assign the pinned model/fallback across scheduled tasks (admin).
      description: >-
        Fleet-wide mutation; admin-only. Optionally limited to tasks pinned to
        from_model. dry_run returns the matched tasks without writing.
      security: [{ adminApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model: { type: string }
                fallback_model: { type: string }
                from_model: { type: string }
                dry_run: { type: boolean }
              required: [model]
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/Error" }

  /sla-report:
    get:
      summary: SLA report — per-task actual-duration p50/p95 + breach rate (#274).
      description: >-
        Aggregates the per-prompt SLA actuals over a window: the expected
        duration, the p50/p95 actual run duration (completed_at - started_at),
        and the breach rate (fraction of runs that crossed the fail threshold).
        Admin-only — duration/breach data is operator-sensitive, not public.
        days= (default 7, clamped to [1, 90]) selects the window.
      security: [{ adminApiKey: [] }]
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: The SLA report for the window.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SLAReport" }
        "500": { $ref: "#/components/responses/Error" }

