        "404": { $ref: "#/components/responses/Error" }

  /triggers/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Fire a webhook-triggered task run.
      description: >-
        Spawns a one-shot run cloned from the trigger's template task, with the
        rendered prompt_template as the prompt. Authenticated SOLELY by the
        per-trigger HMAC-SHA256 secret over the raw body (GitHub-compatible
        X-Hub-Signature-256, or X-Fleet-Signature-256) — NOT the admin API key.
        Unknown slug and bad signature both return 401 (indistinguishable, with
        equalized HMAC work) to prevent slug enumeration. A leaked secret lets a
        caller inject the spawned run's prompt under the template's seat
        (network/MCP/files); the sandbox remains the execution boundary. Rotate
        with `fleet-admin sched trigger rotate`.
      security: []
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "202":
          description: Accepted — a run was enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /auth/login:
    post:
      summary: Username/password login → user token.
      security: []
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401": { $ref: "#/components/responses/Error" }
  /auth/elcano-login:
    get:
      summary: Begin/complete Elcano unified login (sets the elcano_auth cookie).
      security: []
      responses:
        "303": { description: Redirect (See Other) after setting the auth cookie. }
  /auth/logout:
    post:
      summary: Clear the Elcano auth cookie.
      security: []
      responses:
        "303": { description: Redirect (See Other) after clearing the cookie. }
