openapi: 3.1.0
info:
  title: fleet orchestrator API
  version: "1.0.0"
  description: |
    HTTP API for the fleet **orchestrator** (the scheduling engine): node
    registration, scheduled-task lifecycle, API-key administration, the notes
    wiki, run logs, dashboard stats, and auth.

    This document is generated by hand but **kept honest by a CI test**:
    `cmd/fleet/openapi_drift_test.go` walks the real chi router
    (`buildOrchestratorMux`) and fails the build if the set of
    `{method, path}` here ever drifts from the shipped routes, and if any
    operation references a security scheme not defined below. The drift gate
    covers **route + method + security-scheme presence only** — it does NOT
    verify request/response body schemas or status codes, which are documentary.

    The interactive chat HTTP/SSE API (`internal/httpapi`) is a separate surface
    and is not described here.

servers:
  - url: /
    description: The orchestrator listener (same origin as the dashboard).

components:
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: The configured admin API key (full access).
    scopedApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: A scoped (non-admin) API key; access limited to its scopes.
    nodeApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: A registered worker node's API key (node lease/report endpoints).
    registrationToken:
      type: apiKey
      in: header
      name: X-Registration-Token
      description: The node-registration bootstrap token.
    bearerToken:
      type: http
      scheme: bearer
      description: "A user token from the username/password login path (Authorization: Bearer)."
    elcanoAuthCookie:
      type: apiKey
      in: cookie
      name: elcano_auth
      description: The Elcano unified-auth Ed25519-signed identity cookie (scoped-user tier).

  schemas:
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
    MCPChoice:
      type: object
      properties:
        server: { type: string }
        account: { type: string }
      required: [server]
    MCPSelection:
      type: array
      items: { $ref: "#/components/schemas/MCPChoice" }
    TaskCreate:
      type: object
      properties:
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        instruction_self_improve: { type: boolean }
        allow_network: { type: boolean, default: false, description: "Allow this scheduled task's execution sandbox outbound network egress. Default false seals it with --network=none, matching the interactive lockdown path." }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string, description: "5-field cron expression" }
        files: { type: array, items: { type: string } }
      required: [prompt]
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        allow_network: { type: boolean, description: "Whether this task's execution sandbox is allowed outbound network egress (default false = sealed)." }
        status: { type: string, enum: [scheduled, pending, running, completed, failed, cancelled] }
        created_at: { type: string, format: date-time }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string }
        result: { type: string }
        error_message: { type: string }
        files: { type: array, items: { type: string } }
        created_by: { type: string, format: uuid }
      required: [id, prompt, status]
    NodeRegistration:
      type: object
      properties:
        name: { type: string }
        capabilities: { type: array, items: { type: string } }
    Node:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string }
        last_heartbeat: { type: string, format: date-time }
    APIKeyCreate:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
        scopes: { type: array, items: { type: string } }
      required: [name]
    APIKeyCreated:
      type: object
      properties:
        id: { type: string }
        key: { type: string, description: "The plaintext key — shown ONCE at creation." }
        name: { type: string }
        role: { type: string }
    UserCreate:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
      required: [username, password]
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        role: { type: string }
    DashboardStats:
      type: object
      properties:
        scheduled: { type: integer }
        running: { type: integer }
        completed: { type: integer }
        failed: { type: integer }
    LogSession:
      type: object
      description: A captain's-log session (the recorded transcript of one task run).

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

paths:
  /health:
    get:
      summary: Liveness check.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /metrics:
    get:
      summary: Prometheus metrics (text exposition format). Admin-API-key gated.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string }
  /api/config:
    get:
      summary: Public dashboard config (branding, feature flags).
      security: []
      responses:
        "200": { description: OK }

  /register:
    post:
      summary: Register a worker node. (Internal single-host lease plumbing — fleet runs ONE synthetic worker node in-process; this is not a multi-runner feature.)
      security: [{ registrationToken: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NodeRegistration" }
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "401": { $ref: "#/components/responses/Error" }

  /nodes:
    get:
      summary: List nodes.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Node" } }
  /nodes/{node_id}:
    parameters:
      - name: node_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a node.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Node" }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Unregister a node.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Deleted }
        "401": { $ref: "#/components/responses/Error" }
  /nodes/heartbeat:
    post:
      summary: Node heartbeat (worker lease protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200": { description: OK }
        "401": { $ref: "#/components/responses/Error" }

  /tasks:
    get:
      summary: List tasks.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
    post:
      summary: Create (schedule) a task.
      description: Authenticated in-handler — accepts an admin key, a scoped key, a user bearer token, or the Elcano cookie.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      summary: Update a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Cancel a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: Cancelled }
  /tasks/pending:
    get:
      summary: Lease the next pending task (worker protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200":
          description: A task to run, or empty.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
  /tasks/cleanup:
    post:
      summary: Cleanup completed/old task history.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
  /tasks/model:
    post:
      summary: Bulk re-assign the pinned model/fallback across scheduled tasks (admin).
      description: >-
        Fleet-wide mutation; admin-only. Optionally limited to tasks pinned to
        from_model. dry_run returns the matched tasks without writing.
      security: [{ adminApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model: { type: string }
                fallback_model: { type: string }
                from_model: { type: string }
                dry_run: { type: boolean }
              required: [model]
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/Error" }

  /status:
    post:
      summary: Report task status (worker protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200": { description: OK }
  /logs:
    post:
      summary: Submit run logs (worker protocol).
      security: [{ nodeApiKey: [] }]
      responses:
        "200": { description: OK }
  /logs/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get the captain's-log session for a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogSession" }
        "404": { $ref: "#/components/responses/Error" }

  /users:
    post:
      summary: Create a sched user.
      security: [{ adminApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserCreate" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
  /api/me:
    get:
      summary: The authenticated principal.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
  /stats:
    get:
      summary: Dashboard stats.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardStats" }

  /mcp-servers:
    get:
      summary: Optional-MCP catalog for the scheduled-task picker (read-only; never secret values).
      description: >
        Mirrors chat's GET /mcp-servers so the same MCP picker renders in the
        task form. Returns each Optional server's name, display name,
        description, tool count, default-enabled flag, and its credential-account
        seat names (derived from the <VAR>_<ACCOUNT> env suffix scan). Secret
        values are never returned.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        display_name: { type: string }
                        description: { type: string }
                        tool_count: { type: integer }
                        enabled: { type: boolean }
                        accounts:
                          type: array
                          items: { type: string }

  /mcp-accounts:
    get:
      summary: Flat (server, account) credential-seat catalog (names only).
      description: >
        Companion to /mcp-servers for the credential-account admin table. Lists
        every provisioned (server, account) seat by name; never returns secret
        values.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        server: { type: string }
                        account: { type: string }

  /keys:
    post:
      summary: Create an API key (plaintext shown once).
      security: [{ adminApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/APIKeyCreate" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/APIKeyCreated" }
    get:
      summary: List API keys (metadata only).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
  /keys/audit:
    get:
      summary: API-key audit log.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
  /keys/{key_id}:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get an API key's metadata.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Error" }
    delete:
      summary: Delete an API key.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Deleted }
  /keys/{key_id}/spending:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get an API key's current spend vs. daily/monthly caps.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Error" }
  /keys/{key_id}/reset-spending:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Reset an API key's daily/monthly spend accumulators (operator override).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Reset }
        "404": { $ref: "#/components/responses/Error" }
  /keys/{key_id}/rotate:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Rotate an API key (new plaintext shown once).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Rotated }
  /keys/{key_id}/revoke:
    parameters:
      - name: key_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Revoke an API key.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Revoked }

  /notes:
    get:
      summary: List published notes.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: OK }
    post:
      summary: Create a note (admin).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Created }
  /notes/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a note by slug.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Error" }
    put:
      summary: Update a note (admin).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Updated }
    delete:
      summary: Archive a note (admin).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Archived }
  /notes/proposals:
    get:
      summary: List note proposals.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: OK }
  /notes/proposals/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a note proposal.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: OK }
        "404": { $ref: "#/components/responses/Error" }
  /notes/proposals/{id}/publish:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Publish a note proposal (admin).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Published }
  /notes/proposals/{id}/reject:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Reject a note proposal (admin).
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: Rejected }

  /upload:
    post:
      summary: Upload a file for a task's workspace.
      description: Authenticated in-handler — accepts an admin key, a user bearer token, or the Elcano cookie (NOT a scoped API key).
      security: [{ adminApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        "200": { description: Uploaded }
        "401": { $ref: "#/components/responses/Error" }
  /files/{filename}:
    parameters:
      - name: filename
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Download a previously-uploaded file (auth-gated in-handler).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: The file bytes }
        "404": { $ref: "#/components/responses/Error" }

  /triggers/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Fire a webhook-triggered task run.
      description: >-
        Spawns a one-shot run cloned from the trigger's template task, with the
        rendered prompt_template as the prompt. Authenticated SOLELY by the
        per-trigger HMAC-SHA256 secret over the raw body (GitHub-compatible
        X-Hub-Signature-256, or X-Fleet-Signature-256) — NOT the admin API key.
        Unknown slug and bad signature both return 401 (indistinguishable, with
        equalized HMAC work) to prevent slug enumeration. A leaked secret lets a
        caller inject the spawned run's prompt under the template's seat
        (network/MCP/files); the sandbox remains the execution boundary. Rotate
        with `fleet-admin sched trigger rotate`.
      security: []
      requestBody:
        content:
          application/json:
            schema: { type: object }
      responses:
        "202":
          description: Accepted — a run was enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id: { type: string, format: uuid }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /auth/login:
    post:
      summary: Username/password login → user token.
      security: []
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401": { $ref: "#/components/responses/Error" }
  /auth/elcano-login:
    get:
      summary: Begin/complete Elcano unified login (sets the elcano_auth cookie).
      security: []
      responses:
        "303": { description: Redirect (See Other) after setting the auth cookie. }
  /auth/logout:
    post:
      summary: Clear the Elcano auth cookie.
      security: []
      responses:
        "303": { description: Redirect (See Other) after clearing the cookie. }
