openapi: 3.1.0
info:
  title: fleet orchestrator API
  version: "1.0.0"
  description: |
    HTTP API for the fleet **orchestrator** (the scheduling engine):
    scheduled-task lifecycle, API-key administration, the notes wiki, run logs,
    dashboard stats, and auth.

    This document is generated by hand but **kept honest by a CI test**:
    `cmd/fleet/openapi_drift_test.go` walks the real chi router
    (`buildOrchestratorMux`) and fails the build if the set of
    `{method, path}` here ever drifts from the shipped routes, and if any
    operation references a security scheme not defined below.

    A second gate (`TestOpenAPISchemaDrift`) statically cross-checks the reusable
    `components.schemas.*` against their backing Go models via reflection: every
    documented property must exist as a json field on the model, every `required:`
    field must exist and not be `omitempty`, and scalar types must agree. It does
    NOT verify status codes, runtime population, or inline (anonymous, non-`$ref`)
    operation bodies — those remain documentary. Undocumented model fields are
    surfaced as test warnings, not failures. See the test's block comment for the
    exact scope and its limits.

    The interactive chat HTTP/SSE API (`internal/httpapi`) is a separate surface
    and is not described here.

servers:
  - url: /v1
    description: >-
      The versioned orchestrator API (#321) — the stability-guaranteed surface
      for external consumers. Every response carries an X-Fleet-API-Version
      header. Prefer this base; path keys below are relative to it.
  - url: /
    description: >-
      Legacy unversioned paths, served by the SAME handlers for backward
      compatibility. Responses carry Deprecation + Link (successor-version)
      headers; migrate to the /v1 base. (The version prefix is applied by a
      wrapper, so both bases resolve to the identical routes.)

components:
  headers:
    XFleetApiVersion:
      description: >-
        The HTTP API major version (#321). Present on every /v1 response;
        increments only on a breaking API change (independent of the fleet
        binary semver). Clients may assert it to confirm compatibility.
      schema: { type: string, example: "1" }
  securitySchemes:
    adminApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: The configured admin API key (full access).
    scopedApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: A scoped (non-admin) API key; access limited to its scopes.
    bearerToken:
      type: http
      scheme: bearer
      description: "A user token from the username/password login path (Authorization: Bearer)."
    elcanoAuthCookie:
      type: apiKey
      in: cookie
      name: elcano_auth
      description: The Elcano unified-auth Ed25519-signed identity cookie (scoped-user tier).

  schemas:
    ErrorResponse:
      type: object
      properties:
        detail: { type: string, description: "Human-readable error message (the handler's writeError body)." }
    HealthResponse:
      type: object
      properties:
        status: { type: string, example: ok }
    MCPChoice:
      type: object
      properties:
        server: { type: string }
        account: { type: string }
      required: [server]
    MCPSelection:
      type: array
      items: { $ref: "#/components/schemas/MCPChoice" }
    CostRange:
      type: object
      properties:
        min: { type: number }
        max: { type: number }
    ModelPrice:
      type: object
      properties:
        input_per_m: { type: number, description: "USD per 1M input (prompt) tokens" }
        output_per_m: { type: number, description: "USD per 1M output (completion) tokens" }
    CostForecast:
      type: object
      description: >
        Pre-submission cost forecast for a scheduled task (#233). All cost fields
        are null when the model's pricing is unknown; the token estimates are
        still populated. Advisory only — the forecast never gates task creation.
      properties:
        model: { type: string }
        estimated_prompt_tokens: { type: integer }
        system_prompt_tokens: { type: integer }
        tool_definitions_tokens: { type: integer }
        avg_output_tokens: { type: integer }
        max_iterations: { type: integer }
        pricing_known: { type: boolean }
        per_iteration_cost_usd: { type: number, nullable: true }
        estimated_total_cost_usd: { type: number, nullable: true }
        estimated_total_cost_range: { allOf: [{ $ref: "#/components/schemas/CostRange" }], nullable: true }
        max_cost_ceiling_usd: { type: number }
        would_hit_ceiling: { type: boolean }
        price: { allOf: [{ $ref: "#/components/schemas/ModelPrice" }], nullable: true }
        note: { type: string }
    TaskCreate:
      type: object
      properties:
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        instruction_self_improve: { type: boolean, default: false, description: "Captain's Log: give this scheduled task persistent memory across runs (the remember/recall tools + run-start injection, stored in fleet's DB and scoped to this task). Default false = each run starts fresh. Never touches the operator-owned config bundle." }
        allow_network: { type: boolean, default: false, description: "Allow this scheduled task's execution sandbox outbound network egress. Default false seals it with --network=none, matching the interactive lockdown path." }
        allow_task_creation: { type: boolean, default: false, description: "Grant this task's SCHEDULED runs the built-in create_task tool so they can enqueue follow-up tasks. Default false: the tool is never registered, so interactive/unprivileged runs cannot self-schedule (no privilege escalation)." }
        allow_recurring_task_creation: { type: boolean, default: false, description: "Stricter, separately-toggled grant that additionally lets create_task set a cron recurrence on a spawned task. Meaningless without allow_task_creation; default false." }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string, description: "5-field cron expression" }
        files: { type: array, items: { type: string } }
      required: [prompt]
    Task:
      type: object
      properties:
        id: { type: string, format: uuid }
        prompt: { type: string }
        model: { type: string }
        fallback_model: { type: string }
        max_iterations: { type: integer }
        mcp_selection: { $ref: "#/components/schemas/MCPSelection" }
        priority: { type: integer }
        allow_network: { type: boolean, description: "Whether this task's execution sandbox is allowed outbound network egress (default false = sealed)." }
        status: { type: string, enum: [scheduled, pending, running, completed, failed, cancelled] }
        created_at: { type: string, format: date-time }
        scheduled_for: { type: string, format: date-time }
        recurrence: { type: string }
        result: { type: string }
        error_message: { type: string }
        files: { type: array, items: { type: string } }
        created_by: { type: string, format: uuid }
        workspace_path: { type: string, description: "Host filesystem path of the per-run workspace directory the agent wrote into (#287). Present once the run begins; absent for tasks that never ran." }
        allow_task_creation: { type: boolean, description: "Whether this task's scheduled runs may enqueue follow-up tasks via create_task (default false)." }
        allow_recurring_task_creation: { type: boolean, description: "Whether create_task may set a cron recurrence on a task this one spawns (default false)." }
        created_by_task_id: { type: string, format: uuid, description: "The task whose scheduled run spawned this one via create_task. Set server-side for lineage/audit; null for tasks not spawned by a task." }
      required: [id, prompt, status]
    WorkspaceEntry:
      type: object
      properties:
        name: { type: string, description: "Slash-joined path relative to the workspace root; directories carry a trailing slash." }
        size_bytes: { type: integer, format: int64 }
        modified_at: { type: string, format: date-time }
        is_dir: { type: boolean }
      required: [name, size_bytes, modified_at, is_dir]
    WorkspaceListing:
      type: object
      properties:
        files: { type: array, items: { $ref: "#/components/schemas/WorkspaceEntry" } }
        workspace_path: { type: string, description: "The resolved workspace root the listing is rooted at." }
        truncated: { type: boolean, description: "True when the listing was capped (very large workspace)." }
      required: [files, workspace_path]
    APIKeyCreate:
      type: object
      properties:
        name: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
        allowed_node_patterns: { type: array, items: { type: string }, description: "Scope patterns limiting the key's task visibility." }
        rate_limit: { type: integer }
        expires_in_days: { type: integer }
        description: { type: string }
        max_cost_per_day_usd: { type: number, description: "Daily spend cap in USD (omit for unlimited)." }
        max_cost_per_month_usd: { type: number, description: "Monthly spend cap in USD (omit for unlimited)." }
      required: [name]
    APIKeyCreated:
      type: object
      description: "The created key's metadata (the embedded APIKeyResponse) plus the one-time plaintext api_key."
      properties:
        api_key: { type: string, description: "The plaintext key — shown ONCE at creation." }
        key_id: { type: string }
        name: { type: string }
        key_prefix: { type: string }
        allowed_node_patterns: { type: array, items: { type: string } }
        permissions: { type: array, items: { type: string } }
        rate_limit: { type: integer }
        created_at: { type: string, format: date-time }
        enabled: { type: boolean }
        description: { type: string }
    UserCreate:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        role: { type: string, enum: [admin, client, readonly] }
      required: [username, password]
    UserResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        role: { type: string }
    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: "#/components/schemas/UserResponse" }
    DashboardStats:
      type: object
      properties:
        pending_tasks: { type: integer }
        running_tasks: { type: integer }
        completed_tasks_today: { type: integer }
        failed_tasks_today: { type: integer }
    LogSession:
      type: object
      description: A captain's-log session (the recorded transcript of one task run).
    SLAReport:
      type: object
      description: >-
        The GET /sla-report response (#274): per-bucket SLA actuals over a
        window. The bucket key is the task's prompt (fleet has no separate
        `name` column).
      properties:
        period: { type: string, description: "Human label, e.g. last_7_days." }
        window_days: { type: integer, description: "Numeric window bound (1–90)." }
        tasks:
          type: array
          items: { $ref: "#/components/schemas/SLAReportTask" }
      required: [period, window_days, tasks]
    SLAReportTask:
      type: object
      description: One row of the SLA report (#274).
      properties:
        task_name: { type: string }
        expected_minutes: { type: integer }
        p50_actual_minutes: { type: number }
        p95_actual_minutes: { type: number }
        breach_rate_pct: { type: number }
        sample_count: { type: integer }
      required: [task_name, expected_minutes, p50_actual_minutes, p95_actual_minutes, breach_rate_pct, sample_count]

  responses:
    Error:
      description: Error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

paths:
  /health:
    get:
      summary: Liveness check.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthResponse" }
  /api-info:
    get:
      summary: API version discovery (#321).
      description: >-
        Machine-readable version metadata so a client can assert compatibility
        at startup: the API major version (which changes only on a breaking
        change — see docs/api-versioning.md), the fleet binary version, and the
        supported/deprecated version lists. Unauthenticated (same posture as
        /health); reachable at both /api-info and /v1/api-info.
      security: []
      responses:
        "200":
          description: Version metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version: { type: string }
                  fleet_version: { type: string }
                  supported_versions: { type: array, items: { type: string } }
                  deprecated_versions: { type: array, items: { type: string } }
                  schema_url: { type: string }
  /metrics:
    get:
      summary: Prometheus metrics (text exposition format). Admin-API-key gated.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema: { type: string }
  /api/config:
    get:
      summary: Public dashboard config (branding, feature flags).
      security: []
      responses:
        "200": { description: OK }

  /tasks:
    get:
      summary: List tasks.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Task" } }
    post:
      summary: Create (schedule) a task.
      description: Authenticated in-handler — accepts an admin key, a scoped key, a user bearer token, or the Elcano cookie.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/batch:
    post:
      summary: Create multiple tasks in a single call.
      description: >
        Accepts a slice of TaskCreate recipes (up to 100) and creates them in one
        API call. When atomic=true the whole batch is validated up front and
        inserted in a single transaction — any failure rolls back all (422 with
        per-task errors). When atomic=false (default) valid tasks are created
        while invalid ones are skipped, yielding 207 Multi-Status with per-task
        created/failed results. Same auth + rate limiter as POST /tasks; the
        scoped API key's hourly cap is charged N tokens for a batch of N tasks
        (one by the auth check, N-1 by the handler) so the batch path is never a
        rate-limit bypass.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [tasks]
              properties:
                atomic:
                  type: boolean
                  default: false
                tasks:
                  type: array
                  maxItems: 100
                  items: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: All tasks created (atomic or non-atomic with no failures).
          content:
            application/json:
              schema:
                type: object
                properties:
                  created:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string, format: uuid }
                        index: { type: integer }
                  failed:
                    type: array
                    items: { type: object }
                  count: { type: integer }
        "207":
          description: Partial success (non-atomic only); some tasks were skipped.
        "413":
          description: Batch size exceeds the 100-task limit.
        "422":
          description: Atomic rollback or every task failed validation.
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
        "429": { $ref: "#/components/responses/Error" }
  /tasks/estimate:
    post:
      summary: Pre-submission cost forecast for a task.
      description: >
        Same request body as POST /tasks, but returns a token + cost forecast
        and creates nothing. Pure local computation (no model call). Returns 200
        with cost fields populated for a model whose pricing is known, or 202
        with null cost fields and an explanatory note when the model's pricing is
        unknown. Same authentication and rate limiter as POST /tasks.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Forecast (model pricing known)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostForecast" }
        "202":
          description: Forecast with null cost fields (model pricing unknown)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CostForecast" }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }
  /tasks/tags:
    get:
      summary: List the distinct task tags in use with per-tag task counts (busiest first).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    tag: { type: string }
                    task_count: { type: integer }
  /tasks/export:
    get:
      summary: Export task DEFINITIONS (not runs/logs) as a versioned JSON or YAML envelope for backup, cross-box migration, and cloning (#238).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      parameters:
        - name: ids
          in: query
          schema: { type: string }
          description: Comma-separated task UUIDs to export; omit for all tasks.
        - name: format
          in: query
          schema: { type: string, enum: [json, yaml], default: json }
        - name: recurrence_only
          in: query
          schema: { type: boolean, default: false }
          description: Export only tasks with a non-empty recurrence (cron tasks).
      responses:
        "200":
          description: A versioned envelope of task definitions.
          headers:
            Content-Disposition: { schema: { type: string } }
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string }
                  exported_at: { type: string, format: date-time }
                  tasks: { type: array, items: { type: object } }
            application/yaml:
              schema:
                type: object
        "403": { $ref: "#/components/responses/Error" }
  /tasks/import:
    post:
      summary: Import task definitions from a previously exported envelope; creates tasks in a single batch with per-task conflict handling (#238).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      parameters:
        - name: dry_run
          in: query
          schema: { type: boolean, default: false }
          description: Validate and return the plan without writing.
        - name: conflict
          in: query
          schema: { type: string, enum: [error, skip, replace], default: error }
          description: Name-collision handling. conflict=replace additionally requires admin.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: string }
                exported_at: { type: string, format: date-time }
                tasks: { type: array, items: { type: object } }
          application/yaml:
            schema: { type: object }
      responses:
        "200":
          description: Import result (all records created/skipped/replaced, or dry_run).
          content:
            application/json:
              schema:
                type: object
                properties:
                  dry_run: { type: boolean }
                  total: { type: integer }
                  created: { type: integer }
                  skipped: { type: integer }
                  replaced: { type: integer }
                  errors: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        status: { type: string, enum: [created, skipped, replaced, error] }
                        id: { type: string, format: uuid }
                        reason: { type: string }
                        error: { type: string }
        "207":
          description: Multi-status — one or more records errored but others succeeded.
        "409": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "404": { $ref: "#/components/responses/Error" }
    put:
      summary: Update a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TaskCreate" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
    delete:
      summary: Cancel a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200": { description: Cancelled }
  /tasks/{task_id}/output:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task's validated structured output (#244).
      description: >
        Returns the validated JSON result of a structured-output task (one created
        with an output_schema), raw and unwrapped, for direct programmatic
        consumption. 404 when the task has no structured output (no output_schema
        was declared, or the agent's answer failed schema validation); 409 while
        the task has not yet reached a terminal state.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: The validated structured output (shape defined by the task's output_schema).
          content:
            application/json:
              schema: { type: object }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/error-analysis:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Get a task's post-failure error diagnosis (#317).
      description: >
        Returns the asynchronous LLM diagnosis of a TERMINALLY-failed task — a
        structured classification plus suggested remediation — raw and unwrapped,
        for direct programmatic consumption. The diagnosis is produced off-thread
        after a terminal failure with a cheap model and a hard timeout. 404 when
        the task has no error analysis (it did not fail terminally, analysis is
        disabled, or the diagnosis was not produced); 409 while the task has not
        yet reached a terminal state.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: The error diagnosis.
          content:
            application/json:
              schema:
                type: object
                required: [category, summary]
                properties:
                  category:
                    type: string
                    enum:
                      - configuration
                      - credentials
                      - network
                      - rate_limit
                      - timeout
                      - tool_error
                      - model_refusal
                      - resource_exhausted
                      - logic_error
                      - unknown
                  summary: { type: string }
                  remediation:
                    type: array
                    items: { type: string }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/artifacts:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List a task's published output artifacts (#204).
      description: >
        Returns the curated manifest of named output files the run's agent
        explicitly published via the publish_artifact tool — a JSON array of
        {name, path, description, size} — distinct from the raw per-run workspace
        the workspace endpoints expose. Each entry's path is downloadable via the
        task's workspace file endpoint. Restricted to the task's creator (or an
        admin), like the workspace file endpoints — the manifest indexes the
        creator-private workspace. 404 when the run published no artifacts; 409
        while the task has not yet reached a terminal state.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: The published-artifact manifest.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name, path, size]
                  properties:
                    name: { type: string }
                    path: { type: string }
                    description: { type: string }
                    size: { type: integer, format: int64 }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/tags:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Atomically add and/or remove tags on a task.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                add: { type: array, items: { type: string } }
                remove: { type: array, items: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/rerun:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Re-run a task once now (a new task copied from this one, optional overrides).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                overrides:
                  type: object
                  properties:
                    prompt: { type: string }
                    model: { type: string }
                    fallback_model: { type: string }
                    max_iterations: { type: integer }
                    priority: { type: integer }
                    runtime_flavor: { type: string }
                    allow_network: { type: boolean }
                    description: { type: string }
                    tags: { type: array, items: { type: string } }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/clone:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Clone a task (a new task copied from this one, preserving recurrence; optional overrides).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                overrides:
                  type: object
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Task" }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/stream:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Stream a task's run log live (SSE).
      description: >
        Server-Sent Events stream of the task's run log. While the task is in flight
        the in-memory event buffer is tailed live, with Last-Event-ID replay on
        reconnect; once the task has finished the persisted log is replayed one-shot.
        Event types: agent_message, tool_call, tool_result, and a terminal status.
        Same auth + ownership gate as GET /logs/{task_id}.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: An SSE stream of run-log events.
          content:
            text/event-stream:
              schema: { type: string }
        "404": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/workspace:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List (or ZIP-export) the files an agent created in a completed task's workspace.
      description: >
        Lists the files the task's agent wrote into its per-run workspace directory
        (reports, data, code, charts). Access is restricted to the admin or the
        task's creator (the creating user or API key) — strictly more than ordinary
        task visibility, because workspace files are private artifacts. Only available
        for completed tasks (success/error); a running task's workspace is mid-write.
        With ?format=zip the entire workspace is streamed as a ZIP archive (capped at
        FLEET_WORKSPACE_DOWNLOAD_MAX_BYTES total uncompressed size, default 50 MiB).
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      parameters:
        - name: format
          in: query
          required: false
          schema: { type: string, enum: [zip] }
          description: When "zip", stream the whole workspace as a ZIP archive instead of the JSON listing.
      responses:
        "200":
          description: The workspace listing (JSON), or the ZIP archive when ?format=zip.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkspaceListing" }
            application/zip:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /tasks/{task_id}/workspace/*:
    parameters:
      - name: task_id
        in: path
        required: true
        schema: { type: string }
    get:
      summary: Download a single file from a completed task's workspace.
      description: >
        Streams one file from the task's per-run workspace as an attachment. The
        trailing path is interpreted relative to the workspace root and is guarded
        against traversal (".."/absolute/NUL paths are rejected; symlinks that escape
        the workspace root are not followable). Access is restricted to the admin or
        the task's creator. A file larger than FLEET_WORKSPACE_DOWNLOAD_MAX_BYTES
        (default 50 MiB) returns 413 and must be fetched via the CLI.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: The file contents, as an attachment.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "413": { $ref: "#/components/responses/Error" }
  /tasks/cleanup:
    post:
      summary: Cleanup completed/old task history.
      security: [{ adminApiKey: [] }]
      responses:
        "200": { description: OK }
  /tasks/model:
    post:
      summary: Bulk re-assign the pinned model/fallback across scheduled tasks (admin).
      description: >-
        Fleet-wide mutation; admin-only. Optionally limited to tasks pinned to
        from_model. dry_run returns the matched tasks without writing.
      security: [{ adminApiKey: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                model: { type: string }
                fallback_model: { type: string }
                from_model: { type: string }
                dry_run: { type: boolean }
              required: [model]
      responses:
        "200": { description: OK }
        "400": { $ref: "#/components/responses/Error" }

  /admin/migrations:
    get:
      summary: Migration status — applied vs pending sched-DB migrations (#256).
      description: >-
        Read-only operator view of the scheduler (sched) database's schema
        migrations: the current golang-migrate version, whether the tracking row
        is dirty (a prior migration failed mid-flight and needs a `migrate force`
        + restart), and the applied vs pending migration lists derived from the
        embedded `.up.sql` files. Applies nothing — safe to call any time.
        Admin-only. The chat server exposes the equivalent for its own database
        at the same path on its port.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: Migration status for the sched database.
          content:
            application/json:
              schema:
                type: object
                properties:
                  db: { type: string }
                  runner: { type: string }
                  migration_table: { type: string }
                  current_version: { type: integer, nullable: true }
                  dirty: { type: boolean }
                  applied:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        name: { type: string }
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        version: { type: integer }
                        name: { type: string }
        "500": { $ref: "#/components/responses/Error" }

  /admin/queue:
    get:
      summary: Pending task-queue stats — per-tier depth + oldest wait (#230).
      description: >-
        Operator view of the pending task queue: total depth, the oldest pending
        wait, and the count + oldest wait per named priority tier
        (critical/high/normal/low/bulk). Lower priority integer = higher urgency.
        Admin-only — backlog data is operator-sensitive.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: Pending-queue depth and oldest wait, overall and per tier.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending_total: { type: integer }
                  oldest_age_seconds: { type: integer }
                  tiers:
                    type: array
                    items:
                      type: object
                      properties:
                        tier: { type: string }
                        min_priority: { type: integer }
                        max_priority: { type: integer }
                        count: { type: integer }
                        oldest_age_seconds: { type: integer }
        "500": { $ref: "#/components/responses/Error" }

  /admin/reload-config:
    post:
      summary: Hot-reload reloadable settings without a restart (#286).
      description: >-
        Re-reads the small, explicitly safe subset of settings that a running
        fleet may change mid-flight — the per-run cost/token ceilings, the
        per-turn iteration ceiling, and the interactive/scheduled sampling
        temperatures (FLEET_MAX_COST_USD, FLEET_MAX_TOTAL_TOKENS,
        FLEET_MAX_ITERATIONS, FLEET_TEMPERATURE, CUTLASS_TEMPERATURE). Values are
        re-read from the env file (FLEET_ENV_FILE) and process environment with
        the same precedence as boot. Equivalent to sending SIGUSR2. Settings that
        are bound into a listener, connection pool, or signing context at startup
        (bind addresses, DB DSNs, auth secrets, the admission-semaphore size, TLS)
        are NOT reloadable and are reported under `skipped` when changed. Admin-only.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: A diff of what changed, was skipped (needs restart), or errored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  reloaded_at: { type: string, format: date-time }
                  changed:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        old: { type: string }
                        new: { type: string }
                  skipped:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        reason: { type: string }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        key: { type: string }
                        error: { type: string }
        "500": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }

  /admin/mcp-servers/reload:
    post:
      summary: Hot-reload the MCP server catalog without a restart (#218).
      description: >-
        Re-reads the client-config bundle's MCP catalog (manifest.yaml) and
        applies the minimum set of server mutations to the live interactive
        agent — starting newly-added servers, draining + closing removed ones,
        and restarting changed ones — WITHOUT tearing down unchanged servers or
        restarting the process. The change takes effect on the next interactive
        chat turn and the next scheduled run that uses the shared catalog;
        in-flight runs finish on their current tool set. Equivalent to sending
        SIGHUP. Admin-only. Returns a summary of what changed.
      security: [{ adminApiKey: [] }]
      responses:
        "200":
          description: Summary of the servers added, removed, restarted, or left unchanged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  added: { type: array, items: { type: string } }
                  removed: { type: array, items: { type: string } }
                  restarted: { type: array, items: { type: string } }
                  unchanged: { type: array, items: { type: string } }
        "500": { $ref: "#/components/responses/Error" }
        "503": { $ref: "#/components/responses/Error" }

  /sla-report:
    get:
      summary: SLA report — per-task actual-duration p50/p95 + breach rate (#274).
      description: >-
        Aggregates the per-prompt SLA actuals over a window: the expected
        duration, the p50/p95 actual run duration (completed_at - started_at),
        and the breach rate (fraction of runs that crossed the fail threshold).
        Admin-only — duration/breach data is operator-sensitive and the report is
        global (all tasks) while a member may be scoped. The gate is enforced
        in-handler on the admin permission, so the admin API key OR an admin-role
        user (the dashboard's header-trust/bearer session) is accepted while a
        non-admin member gets 403 (#458). days= (default 7, clamped to [1, 90])
        selects the window.
      security: [{ adminApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        "200":
          description: The SLA report for the window.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SLAReport" }
        "500": { $ref: "#/components/responses/Error" }

