  /mcp-servers:
    get:
      summary: Optional-MCP catalog for the scheduled-task picker (read-only; never secret values).
      description: >
        Mirrors chat's GET /mcp-servers so the same MCP picker renders in the
        task form. Returns each Optional server's name, display name,
        description, tool count, default-enabled flag, and its credential-account
        seat names (derived from the <VAR>_<ACCOUNT> env suffix scan). Secret
        values are never returned.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      type: object
                      properties:
                        name: { type: string }
                        display_name: { type: string }
                        description: { type: string }
                        tool_count: { type: integer }
                        enabled: { type: boolean }
                        accounts:
                          type: array
                          items: { type: string }

  /mcp-accounts:
    get:
      summary: Flat (server, account) credential-seat catalog (names only).
      description: >
        Companion to /mcp-servers for the credential-account admin table. Lists
        every provisioned (server, account) seat by name; never returns secret
        values.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  accounts:
                    type: array
                    items:
                      type: object
                      properties:
                        server: { type: string }
                        account: { type: string }

  /task-templates:
    get:
      summary: Read-only task-template catalog for the "new task from a template" UI.
      description: >
        Returns the client bundle's task_templates catalog: each entry's name,
        description, icon, a partial-TaskCreate `task` payload that seeds the
        task-create form, and the {variable} placeholder names extracted from its
        prompt (so the UI can prompt for them before pre-filling). Pure config
        read-through — no template is ever persisted and no task is created here
        (the task is created through the ordinary POST /tasks path). Returns an
        empty array when the bundle ships no templates.
      security: [{ adminApiKey: [] }, { scopedApiKey: [] }, { bearerToken: [] }, { elcanoAuthCookie: [] }]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    name: { type: string }
                    description: { type: string }
                    icon: { type: string }
                    variables:
                      type: array
                      items: { type: string }
                    task:
                      type: object
                      description: >
                        Partial TaskCreate payload (subset of editable fields) used
                        to pre-fill the form. All fields optional.
                      properties:
                        prompt: { type: string }
                        model: { type: string }
                        fallback_model: { type: string }
                        max_iterations: { type: integer }
                        max_retries: { type: integer }
                        recurrence: { type: string }
                        timezone: { type: string }
                        priority: { type: integer }
                        allow_network: { type: boolean }
                        instruction_self_improve: { type: boolean }
                        persona: { type: string }
                        description: { type: string }
                        tags:
                          type: array
                          items: { type: string }

