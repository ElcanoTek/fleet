name: Daily Health Check
description: Rapid morning triage across all active campaigns to catch issues early

philosophy:
  - Speed is key - quick scan, not deep dive
  - Exception-based - only surface what needs attention
  - Proactive - catch zero-delivery within 24 hours

data_collection:
  timeframe:
    - Yesterday vs Day-Before-Yesterday (DoD)
    - Last 7 Days trend
  scope: ALL active campaigns (status = Active/Live)

checks:
  critical:
    zero_spend: Campaigns marked "Active" that spent $0 yesterday
    zero_conversions: Campaigns with >$500 spend but 0 conversions
    zero_impressions: Active campaigns with 0 impressions

  high:
    under_pacing: Campaigns <80% of daily budget or pacing to underspend >10%
    over_pacing: Campaigns >120% of daily cap

  medium:
    cpa_spike: Daily CPA >50% higher than 7-day average
    ctr_drop: Daily CTR <50% of 7-day average
    spend_velocity_change: Unexplained -30% DoD spend drop

output:
  priority_order:
    - CRITICAL - Zero delivery/spend
    - URGENT - Major pacing issues
    - WARNING - Performance fluctuation

  terminal:
    format: Color-coded table using rich
    icons:
      critical: red
      urgent: orange
      warning: yellow
      clear: green

  email:
    tool: mcp_sendgrid_send_email
    content_type: text/html
    structure:
      - Header with date
      - Scorecard (Total Spend, Conversions, Pacing %)
      - Red Alerts section
      - Yellow Alerts section
      - Direct links to DSP console
