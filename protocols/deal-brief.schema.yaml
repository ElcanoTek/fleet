name: Deal Brief Schema
version: "1.0"
owner: Elcano

description: |
  Optional structured input for the multi-deal-creation protocol. A trader
  hands cutlass a YAML file matching this schema (or pastes equivalent YAML
  in the prompt). Free-text prompts are also accepted by the protocol — the
  agent is responsible for extracting the same fields from either form.

  Pass the file path with `--task` like any other input, e.g.:
      cutlass --task "Run protocols/multi-deal-creation.yaml against /briefs/aruba_q2.yaml"

schema:
  type: object
  required:
    - client_name
    - recipient
    - deals
  properties:

    client_name:
      type: string
      description: Display name of the end client. Used for the deal-sheet filename and the email subject. Example "Aruba Tourism Authority", "Carmichael Lynch".

    partner:
      type: string
      description: Default data-partner shown in the sheet's Partner column. Per-deal overrides allowed via deals[].partner.
      example: Soundwave

    theme:
      type: string
      description: Theme key for the deal sheet. Must match a folder under protocols/email_styles/deal_sheet_themes/. Falls back to elcano if unknown.
      default: elcano
      examples:
        - elcano
        - reklaim

    recipient:
      type: string
      format: email
      description: Trader email address. The deal sheet email goes here so the trader can review and forward to the client.

    cc_recipients:
      type: array
      items: { type: string, format: email }
      description: Optional internal cc addresses. Never use for client recipients.

    notes:
      type: string
      description: Short trader note. Included near the email greeting verbatim.

    deals:
      type: array
      minItems: 1
      items:
        type: object
        required:
          - ssp
          - channel
          - deal_name
          - recommended_bid
          - floor
        properties:

          ssp:
            type: string
            enum: [openx, indexexchange, pubmatic, xandr, triplelift, medianet, magnite]
            description: |
              SSP key. Drives which `_execute_deal_from_prompt_inputs` tool the agent calls.
              Magnite (added June 2026 via the ClearLine Curation Demand Management API)
              additionally requires `marketplace`, `dsps`, `publishers`, and `end_date` —
              pass them through the per-deal `extra` dict. See
              protocols/deal-creation-magnite.yaml for Magnite-specific constraints
              (no DV+ audience segments until API v3.0; no per-deal console URL).

          channel:
            type: string
            description: |
              Channel — drives both the deal-sheet grouping and the SSP-side
              creative-format / device / inventory defaults each MCP applies
              when those fields are omitted. The canonical channels (every SSP
              MCP recognises these and auto-fills its native fields):

                Display → Banner format,  web + app,  desktop + mobile + tablet
                OLV     → Video  format,  web + app,  desktop + mobile + tablet
                CTV     → CTV   format,  app-only  (forced),  CTV devices
                OTT     → Video  format,  app-only  (forced),  phone + tablet

              IMPORTANT: OLV is NOT a Display variant — it uses Video format,
              just on the same desktop+mobile+tablet device set. CTV is always
              in-app even if the trader writes "All" for inventory_type. OTT
              is rare; use it for mobile-app video that is NOT CTV-device.

              Other values (Audio, Native, etc.) bypass channel-aware defaults
              — the MCP leaves devices/format to the caller.
            enum: [Display, OLV, CTV, OTT, Audio, Native]
            examples: [Display, OLV, CTV, OTT]

          deal_name:
            type: string
            description: Full canonical deal name (e.g. "Elcano_OpenX_Beeswax_Soundwave_Aruba Tourism_NA_Premium_M_CTV_All").

          recommended_bid:
            type: string
            description: |
              Bid range string for the sheet only. Free text — the SSP doesn't see this.
              INDEPENDENT of `floor` (which is the SSP-side minimum CPM and is usually
              much lower, e.g. $0.10). recommended_bid is what the trader pitches to
              the buyer as a competitive range; floor is what the auction enforces.
              Canonical ranges by channel (use these unless the brief explicitly overrides):
                Display → "$2-$5"
                OLV     → "$8-$12"
                CTV     → "$25-$35"
              Other channels (Audio, Native, etc.) require an explicit value in the brief.

          floor:
            type: number
            description: Numeric SSP floor (CPM in the deal currency). Sent to the SSP execute tool — not displayed on the sheet.

          start_date:
            type: string
            format: date-time
            description: ISO-8601 UTC. Defaults to today UTC if omitted.

          end_date:
            type: string
            format: date-time
            description: ISO-8601 UTC. Optional.

          dsp:
            type: string
            description: DSP / buyer name. Required by some SSPs; can also be derived from deal_name in protocols that pattern-match.

          partner:
            type: string
            description: Per-deal override for the sheet's Partner column. Falls back to top-level `partner` if omitted.

          segment_ids:
            type: array
            items: { type: string }
            description: Audience segment ids/names if the SSP requires them.

          extra:
            type: object
            description: Free-form passthrough — extra arguments forwarded to the per-SSP execute tool.

example:
  client_name: "Aruba Tourism Authority"
  partner: "Soundwave"
  theme: "elcano"
  recipient: "trader@elcanotek.com"
  notes: "Q2 audio + video bundle. Floor floors approved by Brad on 2026-04-30."
  deals:
    # Note: `floor` is the SSP-side auction minimum (typically $0.10 across all
    # channels), NOT the bid range shown to the trader. recommended_bid is the
    # pitch range; floor is what the auction actually enforces.
    - ssp: openx
      channel: CTV
      deal_name: "Elcano_OpenX_Beeswax_Soundwave_Aruba Tourism_NA_Premium_M_CTV_All"
      recommended_bid: "$25-$35"
      floor: 0.10
      start_date: "2026-05-15T00:00:00Z"
    - ssp: indexexchange
      channel: CTV
      deal_name: "Elcano_Index_Beeswax_Soundwave_Aruba Tourism_NA_Premium_M_CTV_All"
      recommended_bid: "$25-$35"
      floor: 0.10
      start_date: "2026-05-15T00:00:00Z"
    - ssp: openx
      channel: OLV
      deal_name: "Elcano_OpenX_Beeswax_Soundwave_Aruba Tourism_NA_Premium_M_OLV_All"
      recommended_bid: "$8-$12"
      floor: 0.10
      start_date: "2026-05-15T00:00:00Z"
    - ssp: indexexchange
      channel: OLV
      deal_name: "Elcano_Index_Beeswax_Soundwave_Aruba Tourism_NA_Premium_M_OLV_All"
      recommended_bid: "$8-$12"
      floor: 0.10
      start_date: "2026-05-15T00:00:00Z"
