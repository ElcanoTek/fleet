---
# Elcano Curator Margin Calculation Protocol
#
# Defines the standard business logic for calculating Elcano and partner margins
# from SSP reports. This protocol ensures consistency when interpreting various
# SSP report formats and applying the correct rev share agreements.

name: Curator Margin Calculation Protocol
description: Standardize the calculation of Elcano and partner margins from SSP reports.
philosophy:
  - "Automate where possible, but ensure logic is transparent and auditable."
  - "Maintain a single source of truth for rev share codes and SSP-specific rules."
  - "Clearly distinguish between total media spend, the curator margin pool, and the final partner/Elcano split."
  - "A deal present in selected source files must never be dropped from processing."

# -----------------------------------------------------------------------------
# Key Terms & Definitions
# -----------------------------------------------------------------------------
key_terms:
  total_spend:
    definition: >-
      The total amount of money spent by the buyer (advertiser/DSP).
      This is the top-line revenue figure for a deal.
    aliases:
      - "Buyer Spend"
      - "Media Spend"
      - "Demand Partner Spend"
      - "Advertiser Spend"
      - "curator_revenue (Xandr)"
  curator_margin:
    definition: >-
      The portion of total_spend that the SSP pays to Elcano for curating the
      deal. This is the net revenue pool that Elcano splits with the partner.
    calculation: >-
      For some SSPs this is reported directly. For others it is calculated as
      (total_spend - ssp_fee).
    aliases:
      - "Curator Net Revenue"
      - "marketplace_owner_fee"
      - "Partner Fee USD"
      - "Transaction Revenue($)"
      - "curator_margin (Xandr)"
      - "Deal Margin (Revenue)"
  client_share:
    definition: >-
      The portion of the curator_margin or total_spend that is paid out to the
      partner (e.g., TWC, Reklaim, Raptive).
    calculation: "Depends on the revshare_code type (Margin or Revenue)."
  elcano_share:
    definition: >-
      The portion of the curator_margin that Elcano retains after paying the
      client_share.
    calculation: "curator_margin - client_share"

# -----------------------------------------------------------------------------
# Rev Share Code Extraction
# -----------------------------------------------------------------------------
extraction_rules:
  pattern: >-
    Search the full deal_name for a valid rev share token; do not require the
    token to be the final underscore-separated segment.
  regex: "(?i)(?:^|[_\\W])(A(?:[1-9]|1[0-3])|B(?:[1-9]|1[0-8])|C[12]|ELC[123]|D00|B00)(?:$|[_\\W])"
  case_insensitive: true
  examples:
    - "..._US_ELC00000_A1 -> A1"
    - "..._US_ELC00017_ELC1 -> ELC1"
    - "..._US_ELC00056_B6 -> B6"
    - "..._US_ELC00056_B6_v2 -> B6"
    - "..._A11_streaming_variant -> A11"

