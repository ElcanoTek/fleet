# -----------------------------------------------------------------------------
# SSP-Specific Margin Rules
# Defines how to find total_spend and curator_margin in each SSP report.
# -----------------------------------------------------------------------------
ssp_margin_rules:
  magnite:
    total_spend_column: "Buyer Spend"
    curator_margin_calculation: >-
      Use "Curator Net Revenue" (already net of the "Curator Platform Fee").
    notes: >-
      Magnite provides gross revenue, a platform fee, and net revenue separately.
      Use the net figure as the margin pool.

  index_exchange:
    total_spend_column: "media_spend"
    curator_margin_column: "marketplace_owner_fee"
    notes: >-
      Index does not have a separate platform fee. The marketplace_owner_fee
      is the entire curator margin.

  openx:
    total_spend_column: "Demand Partner Spend in USD"
    curator_margin_column: "Partner Fee USD"
    notes: "The Partner Fee USD is the curator margin."

  pubmatic:
    total_spend_column: "Spend($)"
    curator_margin_column: "Transaction Revenue($)"
    notes: "Transaction Revenue($) is the curator margin."

  xandr:
    total_spend_column: "curator_revenue"
    curator_margin_column: "curator_margin"
    notes: >-
      Xandr reports the final curator_margin directly.
      curator_revenue is the total spend.

  media_net:
    total_spend_column: "Advertiser Spend"
    curator_margin_column: "Deal Margin (Revenue)"
    notes: "Deal Margin (Revenue) is the curator margin."

# -----------------------------------------------------------------------------
# Margin Calculation Logic
# -----------------------------------------------------------------------------
calculation_logic:
  - if: "revshare_code is not found or not in map"
    then: >-
      Flag as UNRESOLVED. Include row in total_spend and curator_margin totals.
      If an SSP-specific revshare fallback field is available and parseable, use
      it to compute client_share and elcano_share; otherwise set
      client_share = null and elcano_share = curator_margin.

  - if: "revshare_code is D00"
    then: "client_share = 0. elcano_share = curator_margin."

  - if: "revshare_code is B00"
    then: "Flag as OMG. elcano_share and client_share are null."

  - if: "revshare_type is Revenue (A-series codes)"
    steps:
      - "client_share = total_spend * (revshare_pct / 100)"
      - "elcano_share = curator_margin - client_share"

  - if: "revshare_type is Margin (B-series, C-series, ELC-series codes)"
    steps:
      - "client_share = curator_margin * (revshare_pct / 100)"
      - "elcano_share = curator_margin * (1 - (revshare_pct / 100))"

# -----------------------------------------------------------------------------
# Missing Revshare Fallbacks
# -----------------------------------------------------------------------------
missing_revshare_fallbacks:
  principles:
    - "Missing revshare code must not remove a row from aggregation."
    - "Fallback affects split attribution only; inclusion in total margin is mandatory."
  ssp_specific:
    magnite:
      preferred_field: "Curator Rev Share"
      parse_rule: "Interpret as percent. If value <= 1, treat as fraction and multiply by 100."
      use_when: "revshare_code is unresolved and field is present with numeric value >= 0"
      steps:
        - "client_share = curator_margin * (parsed_percent / 100)"
        - "elcano_share = curator_margin - client_share"
    default:
      steps:
        - "client_share = null"
        - "elcano_share = curator_margin"
        - "emit quality flag revshare_code_unresolved"

# -----------------------------------------------------------------------------
# Reconciliation & Coverage Checks
# -----------------------------------------------------------------------------
validation_checks:
  margin_integrity:
    required: true
    formula: "abs(total_curator_margin - (total_client_share + total_elcano_share)) <= tolerance"
    tolerance:
      type: "relative"
      value: 0.01
    fail_flag: "margin_reconciliation_failed"
  revshare_coverage:
    required: true
    formula: "rows_with_mapped_or_fallback_revshare / total_rows"
    warn_below: 0.95
    warn_flag: "revshare_coverage_below_threshold"
  unresolved_reporting:
    required: true
    outputs:
      - "unresolved_row_count"
      - "unresolved_curator_margin"
