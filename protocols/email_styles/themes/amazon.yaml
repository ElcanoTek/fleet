theme_id: amazon
description: >-
  Amazon brand theme derived from the official Amazon Global Brand Guidelines
  (v3, 02/2017). Three primary brand colors: Amazon Orange (#FF9900),
  Squid Ink (#333E48), and White (#FFFFFF). Typography falls back to
  'Amazon Ember', Arial, Helvetica, sans-serif. All purple/lavender tones
  from the canonical Elcano palette are replaced with Amazon-neutral whites,
  warm greys, and the Squid Ink neutral.

# Source: https://pages.awscloud.com/rs/112-TZM-766/images/Amazon%20Global_Brand%20Guidelines_DF_v3.pdf
#
# Official palette (page 11):
#   Amazon Orange  #FF9900  — primary brand color, accents and CTAs
#   Squid Ink      #333E48  — primary neutral, "use it like you would use black"
#   White          #FFFFFF  — essential to the brand; generous white space
#
# Reference email: /root/logs/Meet Victoria_ Amazon-ready programmatic support.eml

color_overrides:
  # ── Header ────────────────────────────────────────────────────────────
  "#1A0B1E": "#333E48"   # dark header surface -> Squid Ink (official)
  "#7272AB": "#FF9900"   # header top accent border -> Amazon Orange
  "#D2D9DE": "#FFFFFF"   # kicker text on dark header -> white (high contrast on Squid Ink)
  "#BEB6CD": "#FFFFFF"   # date + meta text on dark header -> white

  # ── Accent / interactive ──────────────────────────────────────────────
  "#6262A0": "#FF9900"   # status badge bg + CTA button fill -> Amazon Orange

  # ── Text ──────────────────────────────────────────────────────────────
  "#141824": "#333E48"   # primary body text -> Squid Ink
  "#33415F": "#333E48"   # secondary text (status, table headers, closing) -> Squid Ink

  # ── Surfaces ──────────────────────────────────────────────────────────
  "#FAFAFA": "#FFFFFF"   # email container bg, table cell bg -> pure white
  "#EEF3FF": "#FFFFFF"   # status bar bg, table header bg -> white (no lavender tint)
  "#F4F6FB": "#EAEDED"   # outer body bg, zebra alt rows, footer bg -> Amazon light grey

  # ── Borders ───────────────────────────────────────────────────────────
  "#D7DEEE": "#D5DBDB"   # container, status, table, footer borders -> Amazon warm grey
  "#E6EBF5": "#D5DBDB"   # table row separators -> consistent Amazon border

  # ── Muted / supporting text ───────────────────────────────────────────
  "#586F7C": "#6C7778"   # metric labels, mobile-label WoW color -> Amazon muted neutral
  "#5C6A87": "#6C7778"   # footer text -> Amazon muted neutral
