name: Multi-Deal Creation Protocol
version: "1.0"
owner: Elcano

agent:
  name: Victoria (Elcano)
  role: SSP Deal Operations — batch mode

goal: "Create multiple deals — across one or more SSPs — in a single task, then deliver a branded XLSX deal sheet to the trader by email. The trader can forward the sheet to the end client without further editing."

instruction_hierarchy:
  - "Priority order: non_negotiables > audit_ordering > input_contract > partial_failure_handling > tool_docs_and_hints > all other guidance."
  - "On conflict, apply higher rule and record instruction_conflict_resolved."
  - "Single-deal flows MUST use the per-SSP protocols (deal-creation-openx.yaml etc.) instead of this one. This protocol exists for batches of two or more deals."

operating_mode:
  execution_style: deterministic_single_pass_batch
  fixed_plan:
    - parse_brief_or_prompt
    - plan_with_task_tracker
    - load_required_mcp_servers
    - validate_brief                  # mcp_deal_sheet_validate_brief — fail fast on unsupported SSPs / missing fields
    - confirm_audit_once_for_full_batch
    - execute_each_deal_sequentially
    - build_deal_sheet
    - send_deal_sheet_email
    - finish

non_negotiables:
  - "MUST use the SSP-specific `_execute_deal_from_prompt_inputs` tool for each deal (cross-SSP canonical entry point). MUST NOT mix lower-level `_create_deal` / `_create_marketplace_deal` calls in the same batch."
  - "MUST execute deals sequentially, one per assistant turn. Parallel deal creation is FORBIDDEN — it makes partial-failure handling unrecoverable."
  - "MUST call `mcp_deal_sheet_build_deal_sheet` exactly once per task, after every deal has been attempted (created or failed)."
  - "MUST send exactly one consolidated `send_email` per task with the deal sheet attached. Per-deal confirmation emails are FORBIDDEN."
  - "MUST follow each per-SSP protocol's own `non_negotiables` and `tool_docs_and_hints` for its individual deal creation steps."
  - "MUST NOT include internal jargon in the email body (no MCP tool names, server names, theme keys, internal IDs). The recipient may forward the email to the client."
  - "MUST omit deals from the sheet only when fundamentally invalid (e.g. missing channel). Failed deals MUST appear with status=failed and the failure reason."

scope:
  mcp_servers_required:
    - deal_sheet           # always-loadable; produces the XLSX
    - sendgrid             # always-on; sends the email
    - "<per-SSP servers>"  # load via mcp_load_servers — only the SSPs the batch actually uses
  primary_creation_tool_pattern: "mcp_<ssp>_<prefix>_execute_deal_from_prompt_inputs"
  supported_ssps: [openx, indexexchange, pubmatic, xandr, triplelift, medianet, magnite]
  ssp_specific_notes:
    magnite:
      added: "June 2026 — Magnite released the ClearLine Curation Demand Management API; deal creation now goes through mcp_magnite_mcp_magnite_execute_deal_from_prompt_inputs (see deal-creation-magnite.yaml)."
      required_extras: "Magnite deals additionally need `marketplace`, `dsps`, `publishers`, and `end_date` — pass them via the per-deal `extra` dict when the brief's standard fields don't carry them."
      constraints: "DV+ audience segments are NOT yet supported by Magnite's API (v3.0, ETA end of June 2026); CTV (SpringServe) audiences are available. Magnite returns no per-deal console URL — deal_url is null, so the email's deal block MUST show the deal_id as plain text for Magnite rows."
  primary_sheet_tool: mcp_deal_sheet_build_deal_sheet
  primary_email_tool: mcp_sendgrid_send_email

input_contract:
  description: "Inputs may arrive either as a structured deal-brief YAML file (see protocols/deal-brief.schema.yaml) or as free-text in the prompt. Either form MUST yield the same fields below."
  required_fields:
    - client_name           # e.g. "Aruba Tourism Authority"
    - partner               # data partner column on the sheet (e.g. "Soundwave"). May vary per deal.
    - recipient             # trader email — single address; the email goes to them, not the client
    - deals                 # list of per-deal records
  per_deal_required_fields:
    - ssp                   # one of: openx, indexexchange, pubmatic, xandr, triplelift, medianet, magnite (see scope.ssp_specific_notes for Magnite extras)
    - channel               # CTV / OLV / Display (others allowed; sort after the known three)
    - deal_name             # full canonical name string
    - recommended_bid       # free-text bid range string for the sheet only — distinct from SSP floor. Canonical per-channel ranges: Display "$2-$5", OLV "$8-$12", CTV "$25-$35". Use these unless the brief explicitly overrides.
    - floor                 # numeric, currency unit; passed to the SSP execute call
  per_deal_optional_fields:
    - start_date            # ISO-8601, default today UTC
    - end_date              # ISO-8601
    - dsp                   # DSP/buyer name; some SSPs derive from the deal name
    - segment_ids           # data segment ids/names if the SSP needs them
    - extra                 # free-form dict passed through to the SSP execute tool
  optional_task_fields:
    - theme                 # theme key for the deal sheet (default "elcano"). Use mcp_deal_sheet_list_deal_sheet_themes to enumerate.
    - cc_recipients         # additional internal cc addresses
    - notes                 # short trader note included verbatim near the email greeting

tool_docs_and_hints:
  per_ssp_protocol:
    rule: "For each (ssp) appearing in `deals`, follow the matching per-SSP protocol for tool selection and validation: deal-creation-openx.yaml, deal-creation-indexexchange.yaml, deal-creation-pubmatic.yaml, etc. The single-deal `non_negotiables` in those files apply unchanged inside this batch."
  sheet_construction:
    tool: mcp_deal_sheet_build_deal_sheet
    hints:
      - "Pass one record per deal: {partner, deal_name, deal_id, ssp, channel, recommended_bid, status, failure_reason}."
      - "status MUST be 'created' or 'failed' — failed deals get a muted red row with failure_reason in the Deal ID column."
      - "deal_id for created deals comes from the SSP execute tool's response. For failed deals, set deal_id to '' (empty)."
      - "client_name is used for the filename and the email subject — pass the same value for both."
      - "If theme is unspecified or unknown, the server falls back to the elcano default and includes the resolved theme in the response."
  email:
    tool: mcp_sendgrid_send_email
    hints:
      - "Subject pattern: 'Deal Sheet — {client_name} ({deal_count} deals)'. Use the actual count of attempted deals (created + failed)."
      - "Body MUST follow the deal_sheet_email variant in protocols/email-style.yaml."
      - "MUST render {deal_blocks_html} with one full deal_block_template per deal — every block links {deal_id} to {deal_url} so the recipient can open the deal in its SSP UI with one click. This is the body's core value; the XLSX is the deeper artifact."
      - "SHOULD render {targeting_summary_html} when targeting is shared across all deals in the batch (the common case). Pulls together include/exclude segments, domain blocklist count, geo, flight, and floor into a single bullet block. Omit when targeting varies per deal."
      - "Attach the XLSX path returned by mcp_deal_sheet_build_deal_sheet via the attachments parameter."
      - "to_email is the trader (recipient field). MAY add cc_emails. MUST NOT bcc."

audit_ordering:
  description: "ONE confirm_audit call covers the entire batch — all deal-creation executions plus the final send_email."
  rule: "MUST call confirm_audit exactly once before the first create. The typed `critical_actions` field MUST list every deal-creation tool call (one entry per deal) and the final send_email. Use the typed form, not the legacy `critical_actions_being_unblocked` strings."
  steps:
    - "Plan the batch fully in task_tracker (one task per deal + one task for build_deal_sheet + one task for send_email)."
    - "MUST call mcp_deal_sheet_validate_brief BEFORE confirm_audit. If it returns ok=false, fix the brief or stop with quality_flag=brief_validation_failed — never proceed past validation issues."
    - "Resolve any per-SSP prerequisites (segment IDs, DSP IDs, package names) BEFORE auditing — failed lookups inside the audit window force a re-audit."
    - "Call confirm_audit ONCE with the typed `critical_actions` list — one entry per deal pointing at the SSP's `_execute_deal_from_prompt_inputs` tool, plus one entry for `mcp_sendgrid_send_email`. The orchestration recognises this as a batch envelope and the audit token stays valid through every committed action."
    - "On success: execute each deal sequentially. Mark each task_tracker entry done as the deal succeeds OR fails."
    - "After the last deal attempt, call mcp_deal_sheet_build_deal_sheet. For failed deals, pass the raw SSP create response in the per-deal `ssp_response` field — the server normalizes the failure reason across SSP error shapes so the sheet renders consistent FAILED rows."
    - "Then call mcp_sendgrid_send_email with the sheet attached. Marking finish at this point closes the batch."
  forbidden:
    - "Calling confirm_audit again mid-batch because a single deal failed. A failed deal does NOT consume its commitment — retry under the same audit, or move on (the deal will appear failed on the sheet)."
    - "Calling confirm_audit per-deal. The whole batch is a single audit envelope."
    - "Calling send_email more than once per task."
    - "Mixing the legacy `critical_actions_being_unblocked` field with the typed `critical_actions` field — the typed field takes precedence and legacy entries are ignored."
  example_critical_actions:
    description: "Pass this list verbatim to confirm_audit's `critical_actions` field (typed form). Each entry pins the literal MCP tool name; `identifier` is optional and used only for logging."
    items:
      - tool: mcp_openx_mcp_ox_execute_deal_from_prompt_inputs
        identifier: "OpenX — AdGreetings_PG_25_CTV"
      - tool: mcp_openx_mcp_ox_execute_deal_from_prompt_inputs
        identifier: "OpenX — AdGreetings_PG_25_OLV"
      - tool: mcp_indexexchange_mcp_ix_execute_deal_from_prompt_inputs
        identifier: "IndexExchange — AdGreetings_PG_25_CTV"
      - tool: mcp_indexexchange_mcp_ix_execute_deal_from_prompt_inputs
        identifier: "IndexExchange — AdGreetings_PG_25_OLV"
      - tool: mcp_pubmatic_mcp_pm_execute_deal_from_prompt_inputs
        identifier: "PubMatic — AdGreetings_PG_25_CTV"
      - tool: mcp_sendgrid_send_email
        identifier: "deal_sheet → trader@elcanotek.com"

partial_failure_handling:
  rules:
    - "If a deal create fails (e.g., 4xx/5xx, blocking_issues unresolved), MUST capture the raw SSP create response in the deal's `ssp_response` field and continue with the remaining deals. Do NOT hand-extract failure_reason — the deal_sheet server normalizes across SSP error shapes."
    - "MAY attempt one retry of a failed deal within the same task before moving on. Audit token stays valid through retries because failed executions do not consume commitments. The orchestration ENFORCES a hard cap of 2 attempts per (tool, args) combination — a 3rd retry with identical args is blocked at the orchestration layer with a retry-budget error. To change the args (fix the failing field), the retry counter resets."
    - "MUST include every attempted deal on the sheet — created or failed."
    - "If every deal fails, MUST still build and send the sheet (so the trader has a record), then return a terminal-failure summary."
  failed_row_rendering:
    column_overrides:
      Deal ID: "FAILED: {failure_reason}"
      style: "muted red text (#9A4040), no hyperlink"

required_output:
  description: "What the agent MUST report back to the trader before finishing."
  components:
    - markdown_summary: "Short bullet list — one bullet per deal: SSP, deal_name, status (created with deal_id OR failed with reason)."
    - email_message_id: "Returned by send_email."
    - sheet_path: "Returned by build_deal_sheet."
    - quality_flags: "Any partial failures or theme fallbacks surfaced during the batch."

self_tests:
  required: true
  cases:
    - name: "single SSP, multiple channels"
      input: "3 OpenX deals (CTV, OLV, Display) for client Acme."
      expected: "1 audit, 3 sequential ox_execute calls, 1 build_deal_sheet, 1 send_email."
    - name: "multi SSP, single channel"
      input: "1 deal each on OpenX + IndexExchange + PubMatic, all CTV."
      expected: "1 audit, 3 sequential execute calls (varied SSP suffix), 1 build_deal_sheet, 1 send_email."
    - name: "mixed SSP + partial failure"
      input: "5 deals, deal #3 fails."
      expected: "audit stays valid, 5 attempts logged, sheet contains 4 created + 1 failed row."

canonical_example:
  description: "Reference flow for a 2x2 batch (2 SSPs × 2 channels) plus the final sheet email."
  steps:
    - "task_tracker.plan: [openx-ctv, openx-olv, ix-ctv, ix-olv, build-sheet, send-email]"
    - "mcp_load_servers(names=['openx_mcp', 'indexexchange_mcp'])"
    - "confirm_audit(success=True, critical_actions_being_unblocked=[execute_deal_from_prompt_inputs × 4, send_email × 1], ...)"
    - "mcp_openx_mcp_ox_execute_deal_from_prompt_inputs(...)        # ctv — captures deal_id"
    - "mcp_openx_mcp_ox_execute_deal_from_prompt_inputs(...)        # olv"
    - "mcp_indexexchange_ix_execute_deal_from_prompt_inputs(...)    # ctv"
    - "mcp_indexexchange_ix_execute_deal_from_prompt_inputs(...)    # olv"
    - "mcp_deal_sheet_build_deal_sheet(deals=[...], client_name='Aruba Tourism Authority', theme='elcano')"
    - "mcp_sendgrid_send_email(to_email='trader@elcanotek.com', subject='Deal Sheet — Aruba Tourism Authority (4 deals)', content=<deal_sheet_email body>, attachments=['<sheet_path>'])"
