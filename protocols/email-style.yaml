# =============================================================================
# DEAL SHEET EMAIL (multi-deal-creation protocol)
#
# Compact body for the email that delivers a built deal-sheet XLSX to a
# trader. The XLSX attachment is the actual deliverable — this body is a
# short courier note. Reuse Header + Footer styling from the canonical
# template; OMIT charts, KPI cards, CTA buttons, and risk callouts (they
# don't apply).
#
# The trader may forward the email to the client, so the body MUST stay
# free of internal jargon (no SendGrid / MCP / theme keys / tool names).
# =============================================================================

deal_sheet_email:
  description: >
    Rich per-deal report body for multi-deal-creation. Send via
    mcp_sendgrid_send_email with the deal-sheet XLSX attached. The email
    body itself names every deal, links each deal_id to its SSP UI,
    summarizes the shared targeting (segments + domain count), and ends
    with the XLSX attachment reference. The XLSX is the deeper artifact
    for forwarding; the body gives the recipient enough to validate the
    batch at a glance without opening the attachment.
  required_components: [Header, Greeting, Summary, PerDealBlocks, TargetingSummary, Attached, Footer]
  forbidden_components: [DemoData, RiskCallout, MetricsCard, HeadlineMetrics, CTA]

  subject_pattern: "Deal Sheet — {client_name} ({deal_count} deals)"

  placeholders:
    - "{client_name}            : end client name (e.g. Aruba Tourism Authority)"
    - "{deal_count_total}       : total number of deals attempted"
    - "{deal_count_created}     : count where status='created'"
    - "{deal_count_failed}      : count where status='failed' (omit the failure <tr> if 0)"
    - "{ssp_list}               : comma-separated SSPs covered (e.g. 'Index Exchange, OpenX')"
    - "{channel_summary}        : short list like 'CTV: 4, OLV: 4'"
    - "{trader_first_name}      : optional, falls back to 'team'"
    - "{notes}                  : optional trader note (verbatim, no transformation)"
    - "{attachment_filename}    : sheet filename (e.g. the-weather-company_deal_sheet_20260512.xlsx)"
    - "{deal_blocks_html}       : REQUIRED — agent-rendered HTML block-per-deal, see deal_block_template below"
    - "{targeting_summary_html} : optional — agent-rendered shared-targeting summary, see targeting_summary_template below"

  # The agent renders {deal_blocks_html} by repeating this exact <tr>
  # block once per deal, substituting the per-deal values. ORDER deals
  # by channel first (CTV → OLV → Display → others alphabetical) so the
  # email body mirrors the XLSX grouping.
  deal_block_template: |
    <tr>
      <td style="padding: 8px 28px 4px 28px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; border-collapse: collapse;">
          <tr>
            <td style="padding: 12px 16px; background-color: #F4F6FB; border-left: 3px solid #6262A0; font-size: 14px; line-height: 20px; color: #33415F;">
              <div style="font-weight: 700; color: #1A0B1E; margin-bottom: 4px;">Deal {n} — {channel}</div>
              <div style="font-family: 'Courier New', Courier, monospace; font-size: 12px; color: #5C6A87; word-break: break-all; margin-bottom: 6px;">{deal_name}</div>
              <div>
                <a href="{deal_url}" style="color: #6262A0; text-decoration: underline; font-weight: 600; font-size: 13px;">{deal_id} — Open in SSP</a>
                <span style="font-size: 12px; color: {status_color}; font-weight: 600; margin-left: 8px;">{status_icon} {status_label}</span>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  # Per-deal substitution values for deal_block_template:
  #   {n}            : 1-based deal number in the batch
  #   {channel}      : "CTV" | "OLV" | "Display" | etc.
  #   {deal_name}    : full canonical deal name string
  #   {deal_url}     : SSP UI link (e.g. https://app.indexexchange.com/deals/<id>/show?account_id=<acct>)
  #                    For failed deals the agent SHOULD pass "#" and rely on status_icon to make the
  #                    failure obvious; the link is non-functional but the layout stays consistent.
  #   {deal_id}      : external deal ID (e.g. IX177861853976549396, OX-bef-V06sGg)
  #   {status_color} : "#1C5A33" for created (green), "#7C1F1F" for failed (red)
  #   {status_icon}  : "✓" for created, "✗" for failed
  #   {status_label} : "Created" | "Failed: <reason>"

  # The agent renders {targeting_summary_html} when targeting is shared
  # across deals (the common case). Omit entirely if targeting varies
  # per deal — in that case fold the relevant details into each deal's
  # block instead. Substitute every {var}; drop a <li> entirely if the
  # data isn't available.
  targeting_summary_template: |
    <tr>
      <td style="padding: 12px 28px 8px 28px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width: 100%; border-collapse: collapse;">
          <tr>
            <td style="padding: 12px 16px; background-color: #FAFAFA; font-size: 13px; line-height: 19px; color: #33415F;">
              <div style="font-weight: 700; color: #1A0B1E; margin-bottom: 6px;">Shared targeting</div>
              <ul style="margin: 0; padding-left: 18px;">
                <li><strong>Include segments:</strong> {include_segments_summary}</li>
                <li><strong>Exclude segments:</strong> {exclude_segments_summary}</li>
                <li><strong>Domain blocklist:</strong> {domain_count_summary}</li>
                <li><strong>Geo:</strong> {geo_summary}</li>
                <li><strong>Flight:</strong> {flight_summary}</li>
                <li><strong>Floor:</strong> {floor_summary}</li>
              </ul>
            </td>
          </tr>
        </table>
      </td>
    </tr>

  body_html: |
    <!DOCTYPE html>
    <html lang="en">
      <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
      </head>
      <body style="margin:0; padding:0; background-color:#F4F6FB; font-family:'Segoe UI', Arial, sans-serif;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F4F6FB;">
          <tr>
            <td align="center" style="padding:24px 12px;">
              <table role="presentation" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px; background-color:#FAFAFA; border-collapse:collapse;">
                <!-- HEADER -->
                <tr>
                  <td style="background-color:#1A0B1E; color:#CCCCFF; padding:20px 28px; font-size:18px; line-height:24px; font-weight:700;">
                    Deal Sheet — {client_name}
                  </td>
                </tr>
                <!-- GREETING + INTRO -->
                <tr>
                  <td style="padding:24px 28px 8px 28px; font-size:16px; line-height:24px; color:#33415F;">
                    Hi {trader_first_name},
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 28px 16px 28px; font-size:15px; line-height:22px; color:#33415F;">
                    Per-deal detail for the <strong>{client_name}</strong> batch is below; the XLSX attachment carries the full trader-and-client-ready view.
                  </td>
                </tr>
                <!-- SUMMARY -->
                <tr>
                  <td style="padding:0 28px 8px 28px; font-size:15px; line-height:22px; color:#33415F;">
                    <strong>{deal_count_created}</strong> deals created across <strong>{ssp_list}</strong>.
                  </td>
                </tr>
                <!-- FAILED LINE — include only if deal_count_failed > 0 -->
                <tr>
                  <td style="padding:0 28px 8px 28px; font-size:15px; line-height:22px; color:#7C1F1F;">
                    {deal_count_failed} deals could not be created — see each failed block below + the attached sheet for the full failure reason on each row.
                  </td>
                </tr>
                <!-- CHANNEL BREAKDOWN -->
                <tr>
                  <td style="padding:0 28px 12px 28px; font-size:15px; line-height:22px; color:#33415F;">
                    <strong>By channel:</strong> {channel_summary}.
                  </td>
                </tr>
                <!-- PER-DEAL BLOCKS (one block per deal — see deal_block_template) -->
                {deal_blocks_html}
                <!-- SHARED TARGETING SUMMARY (omit if targeting varies per deal) -->
                {targeting_summary_html}
                <!-- TRADER NOTES (optional, verbatim) -->
                <tr>
                  <td style="padding:8px 28px 12px 28px; font-size:15px; line-height:22px; color:#33415F;">
                    {notes}
                  </td>
                </tr>
                <!-- ATTACHMENT REF -->
                <tr>
                  <td style="padding:8px 28px 24px 28px; font-size:14px; line-height:20px; color:#5C6A87;">
                    Full sheet attached: <strong>{attachment_filename}</strong>
                  </td>
                </tr>
                <!-- FOOTER -->
                <tr>
                  <td style="background-color:#F4F6FB; border-top:1px solid #D7DEEE; padding:16px 28px; font-size:13px; line-height:18px; color:#5C6A87; text-align:center;">
                    Generated by Victoria
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </body>
    </html>

  rules:
    - "MUST attach the XLSX path returned by mcp_deal_sheet_build_deal_sheet via the attachments parameter — never copy its contents into the body."
    - "MUST render {deal_blocks_html} with one full deal_block_template per deal, substituting every {var}. Order by channel: CTV → OLV → Display → others alphabetical, matching the XLSX grouping."
    - "MUST link {deal_id} to {deal_url} so the recipient can click through to the SSP UI. For created deals, deal_url is the value returned by the SSP execute_deal_from_prompt_inputs tool. For failed deals, set deal_url='#' and rely on the red status_icon to make the failure obvious."
    - "SHOULD render {targeting_summary_html} when targeting is shared across deals (the common case). Omit it entirely when targeting varies per deal and fold the variant fields into each deal_block instead."
    - "MUST omit the failure line entirely when deal_count_failed == 0 (drop the entire <tr> for cleanness)."
    - "MUST omit the trader-notes <tr> when notes is empty/blank."
    - "MUST NOT include any internal jargon (no MCP / theme key / SendGrid / agent prose). The body must remain safe to forward to a client if the trader chooses to do so."
    - "MUST keep the body under ~250 lines of rendered HTML — this is a per-deal report with attachment, not a pitch deck."
    - "MAY tweak the header background to match the deal-sheet theme's header.background hex if the trader explicitly wants the email to match the sheet branding. Default is the Elcano deep purple shown above."
