---
name: Email Style Guide
description: >
  Component library for HTML email rendering. The canonical_template below
  is the single source of truth — mirrored from flag/design-system/email-safe.html.
  It is a PATTERN REFERENCE showing reusable components. The workflow (MAP YAML)
  decides WHICH sections appear; this file decides HOW they look.

# =============================================================================
# RULES
# Seven non-negotiable rules. Everything else is guidance.
# =============================================================================

rules:
  - "MUST use content_type='text/html'. NEVER send plain or unstyled HTML."
  - "MUST build every email from canonical_template. Copy the fixed sections
    verbatim and use the pattern sections as building blocks for whatever
    the workflow requires (see components table below)."
  - "MUST NOT include the template's example data in sent emails. Names like
    'Amazon US OLV', dollar amounts like '$589,075.45', etc. exist only to
    demonstrate the HTML pattern."
  - "MUST strip all HTML comments (<!-- ... -->) before sending."
  - "MUST NOT inline new colors or CSS. Use theme color_overrides only."
  - "MUST copy the COMPLETE @media CSS block including ALL mobile rules.
    Omitting any rule breaks mobile table stacking."
  - "MUST NOT fabricate images. Every <img> src MUST be either (a) a
    cid: reference with a matching entry in inline_attachments (the
    workflow supplies the file), or (b) an https:// URL to a real,
    reachable asset. data: URIs, inline SVG, file:// paths, and empty
    src values are FORBIDDEN — the canonical template has no logo or
    icon slot, so any image added by the agent without a corresponding
    asset renders as a broken icon in the recipient's client. The
    sendgrid send_email tool rejects sends that violate this rule."
  - "Every <td> in a data-table <tbody> MUST contain a mobile-label span:
    <span class=\"mobile-label\" style=\"display:none; font-size:0; line-height:0; max-height:0; overflow:hidden;\">ColumnHeader</span>.
    The multi-property hide (display:none + font-size:0 + line-height:0 +
    max-height:0 + overflow:hidden) keeps the label invisible even when a
    forwarding path or sanitizer strips one declaration; the @media block
    restores all five with !important so the reveal is atomic. Without the
    span, stacked cells on mobile have no context. The mobile-label
    text MUST match the visible <th> for that column — and both MUST be
    dimensional, not generic. Use the dimension the column actually
    represents (e.g. Campaign, Channel, Geo, Device, Date) — never a
    placeholder noun like 'Metric', 'KPI', 'Item', or 'Field'. Generic
    nouns read as tautological next to self-describing row identities
    (e.g. 'Metric: DSP Spend' on a stacked mobile row), which defeats the
    purpose of the label. If the workflow truly has nothing dimensional to
    label the first column with, redesign the table so the values that need
    disambiguation are not in the first column."
  - "MUST NOT append a bare <div>, <p>, <h1>, <h2>, <h3>, <ul>, <a>,
    <span>, or a free-form <table> directly between component <tr> rows
    of the canonical_template's `<table class=\"email-container\">`.
    Every section that lives in that container must be a <tr> — when
    you need to add a custom section (opening prose, an extra
    sub-heading + paragraphs, a one-off table), wrap the contents in
    `<tr><td class=\"body-pad\" style=\"padding:20px 28px 0 28px;\">…</td></tr>`
    using the same body-pad style the canonical_template uses for its
    own rows. HTML5 parsers FOSTER-PARENT invalid table children
    (everything except <tr> / <thead> / <tbody> / <tfoot> / <caption> /
    <colgroup>) OUTSIDE the table — typically hoisted above the dark
    Victoria header, even though your source has it lower down. The
    sendgrid validate_email_content tool rejects sends that violate
    this rule."
  - "MUST set a hard HTML width attribute on every <img> inside
    email-container (e.g. `width=\"544\"`). Outlook desktop (Word
    engine) ignores `style=\"max-width:100%\"` on images, so a wide
    PNG renders at its native pixel size and pushes the layout past
    the 600px container — this is the #1 cause of recipients having
    to scroll horizontally to see the data. The container is 600px
    with 28px horizontal body-pad, so the safe inline width is 544.
    Render the source PNG at 2× (1088px) for retina sharpness and
    let the width attribute lock the displayed size. See
    `chart_image_html` below for the full pattern."
  - "MUST set `table-layout:fixed` on every desktop `.data-table` (in
    the inline `style=`, not only in the @media block) AND give every
    `<th>` an explicit `width=\"X%\"` whose values sum to 100. Without
    fixed layout the longest cell in any column forces the column
    wider, breaking the 600px container. Every `<td>` whose content
    could be a long string (advertiser, agency, campaign, deal_id)
    MUST also carry `word-break:break-word` (or
    `overflow-wrap:anywhere`) inline so wrapping happens inside the
    fixed column rather than busting it open. The mobile @media block
    reverts to display:block per cell, so the fixed widths only apply
    on desktop where they are needed."
  - "SHOULD keep desktop data tables to ≤ 5 visible columns. With 6
    columns at 600px each cell drops below ~85px usable width and any
    multi-word string wraps to 3+ lines, which is what produced the
    \"too wide / sloppy\" look. If a workflow truly needs more than 5
    columns, either (a) split into two tables (e.g. \"Performance\"
    and \"Efficiency\"), or (b) demote the lowest-value column to the
    Optional Detail Appendix. NEVER reintroduce horizontal scroll by
    forcing 6+ columns into the desktop view."
  - "Financial column-order convention: dimensional columns
    (Campaign / Advertiser / Agency / Channel …) → Spend ($) → Revenue
    ($) → Margin ($) → Margin % → Share of Total → other ratios.
    **Spend ALWAYS appears before Margin.** This matches how traders
    and execs read a P&L — Spend is the input, Margin is the output.
    Reversing the order reads as a margin-first/spend-buried framing
    that operators consistently flag in review."
  - "Chart/image cards rendered via `cid:` reference MUST follow the
    sizing contract: source PNG = 1088×N (where the agent's natural
    aspect ratio determines N, capped at 480px tall); HTML render
    width = 544; HTML `width=\"544\"` attribute MUST be present;
    `style=\"display:block; max-width:100%; height:auto;\"` lets
    mobile clients scale down. Charts MUST be drawn with
    `bbox_inches='tight'` (matplotlib) so axis labels are not clipped,
    and the x-axis tick locations MUST be set explicitly from the
    underlying data points (`ax.set_xticks(data_dates)`) rather than
    relying on an auto-locator — otherwise dates drift out of
    alignment with their markers, which reads as \"sloppy\"."

# =============================================================================
# COMPONENTS
# Each row maps a template section (marked by an HTML comment like
# <!-- HEADER -->) to its usage rule. The template IS the component library.
# =============================================================================
#
#   Component          | Usage    | Notes
#   -------------------|----------|---------------------------------------------
#   HEAD + outer       | verbatim | <head>, MSO conditionals, @media CSS, body
#   structure          |          | wrapper, email-container table.
#   -------------------|----------|---------------------------------------------
#   HEADER             | verbatim | Dark branded header. Substitute
#                      |          | {{placeholders}} but keep HTML structure.
#   -------------------|----------|---------------------------------------------
#   STATUS BAR         | verbatim | Badge + inline status. Substitute
#                      |          | {{placeholders}} but keep HTML structure.
#                      |          | MUST close the inner <table> before body
#                      |          | rows — omitting </table></td></tr> here
#                      |          | nests ALL body content inside a 2-col
#                      |          | table, creating a blank gap on the right.
#   -------------------|----------|---------------------------------------------
#   BODY content       | pattern  | Padding, font, color styles. Adapt text
#                      |          | freely for any prose section.
#   -------------------|----------|---------------------------------------------
#   METRICS CARD       | pattern  | Bordered off-white card for key figures.
#                      |          | Repeat or omit as needed.
#   -------------------|----------|---------------------------------------------
#   HEADLINE METRICS   | pattern  | Large-number KPI card (see separate
#                      |          | headline_metrics_html below — not in the
#                      |          | template's example arrangement).
#   -------------------|----------|---------------------------------------------
#   RISK CALLOUT       | pattern  | Orange-accent bordered box for warnings.
#                      |          | Repeat or omit as needed.
#   -------------------|----------|---------------------------------------------
#   OPPORTUNITY CALLOUT| pattern  | Green-accent bordered box for upside.
#                      |          | Repeat or omit as needed.
#   -------------------|----------|---------------------------------------------
#   DATA TABLE         | pattern  | thead/tbody with zebra rows and
#                      |          | mobile-label spans. Add/remove columns
#                      |          | (≤ 5 desktop cols). MUST include
#                      |          | table-layout:fixed and width="X%" on
#                      |          | every <th> (sum to 100). Repeat for
#                      |          | multiple tables.
#   -------------------|----------|---------------------------------------------
#   CHART IMAGE        | pattern  | Kicker + centered <img> with hard
#                      |          | width="544". See chart_image_html below.
#                      |          | Source PNG MUST be 1088×N (2× retina).
#   -------------------|----------|---------------------------------------------
#   SHARE-OF-TOTAL BAR | pattern  | In-cell horizontal bar + numeric label
#                      |          | for proportional values inside a data
#                      |          | table. See share_of_total_bar_html below.
#   -------------------|----------|---------------------------------------------
#   CTA                | optional | Bulletproof VML + table button. Include
#                      |          | ONLY when the workflow defines a CTA.
#                      |          | NEVER auto-fill cta_url with invented URLs.
#   -------------------|----------|---------------------------------------------
#   CLOSING            | pattern  | Next-steps / outlook prose block.
#                      |          | Adapt text freely.
#   -------------------|----------|---------------------------------------------
#   FOOTER             | default  | "Generated by Victoria". Include as-is by
#                      |          | default. MAY be customized when the workflow
#                      |          | or operator explicitly requests changes.
#   -------------------|----------|---------------------------------------------
#
# Usage key:
#   verbatim  — MUST copy HTML structure exactly (substitute {{placeholders}}).
#   pattern   — Use as a building block. Adapt content, repeat, reorder, or
#               omit to match the workflow's required sections.
#   optional  — Include only when the workflow explicitly requests it.
#   default   — Include as-is unless the workflow or operator overrides it.
#
# General guidance:
#   - Workflow section order ALWAYS wins over the template's example order.
#   - MAY add, remove, or reorder pattern sections freely.
#   - MAY repeat patterns (multiple tables, multiple callouts).
#   - Use the kicker style (12px uppercase #586F7C) for any section heading.
#   - MUST produce ONE HTML document — never render the template separately.

# =============================================================================
# PLACEHOLDERS
# Substitute these {{tokens}} in the HEADER and STATUS BAR.
# =============================================================================

placeholders:
  required:
    preheader_text: "Hidden inbox-preview text (40-100 chars)"
    date: "Header right side, ISO format e.g. 2026-04-09"
    email_subject: "Header headline (35-60 chars)"
    client_name: "Header meta, left side"
    date_range: "Header meta, right side"
    badge_label: "Status strip badge text"
    status: "Status strip inline text"
  optional:
    cta_url: "CTA button href — include ONLY when the workflow defines a CTA"
    cta_text: "CTA button label, max 25 chars — omit CTA block entirely if no CTA"

# =============================================================================
# HEADLINE METRICS (supplemental component — not in canonical_template)
# Use for prominent topline KPIs: total spend, margin, WoW deltas.
# Larger and bolder than the standard metrics card. 3-5 KPI rows max.
# =============================================================================

headline_metrics_html: |
  <tr>
    <td class="body-pad" style="padding:20px 28px 0 28px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse; background-color:#F4F6FB; border:1px solid #D7DEEE;">
        <tr>
          <td style="padding:16px 18px 8px 18px;">
            <h2 style="margin:0; font-size:12px; line-height:17px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#586F7C;">{{section_kicker}}</h2>
          </td>
        </tr>
        <tr>
          <td style="padding:0 18px 4px 18px;">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
              <!-- Repeat this row for each KPI (3-5 max) -->
              <tr>
                <td style="padding:6px 0; font-size:14px; line-height:20px; color:#586F7C; width:45%;">{{metric_label}}</td>
                <td style="padding:6px 0; font-size:22px; line-height:28px; font-weight:700; color:#141824; text-align:right;">{{metric_value}}</td>
                <td style="padding:6px 0 6px 8px; font-size:14px; line-height:20px; font-weight:700; text-align:left; width:25%;">
                  <!-- #1C5A33 positive, #7C1F1F negative, #586F7C neutral -->
                  <span style="color:#1C5A33;">{{delta_text}}</span>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>

# =============================================================================
# CHART IMAGE (supplemental component — not in canonical_template)
# Use when a workflow attaches a chart PNG via cid: reference.
#
# Source PNG MUST be 1088×N pixels (2× retina); displayed at 544px.
# 544 = 600 (container) − 28 × 2 (body-pad). The width="544" HTML
# attribute is mandatory: Outlook desktop ignores CSS max-width:100%
# on images, which is the #1 cause of "have to scroll right" reports.
# =============================================================================

chart_image_html: |
  <tr>
    <td class="body-pad" style="padding:20px 28px 0 28px;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse;">
        <tr>
          <td style="padding:0 0 8px 0;"><h2 style="margin:0; font-size:12px; line-height:17px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:#586F7C;">{{section_kicker}}</h2></td>
        </tr>
        <tr>
          <td style="padding:0 0 12px 0; text-align:center;">
            <img src="cid:{{chart_cid}}" alt="{{chart_alt}}" width="544" style="display:block; width:544px; max-width:100%; height:auto; border:1px solid #D7DEEE; margin:0 auto;">
          </td>
        </tr>
        <tr>
          <!-- Optional caption — omit the entire <tr> if no caption. -->
          <td style="font-size:12px; line-height:17px; color:#586F7C; padding:0 0 4px 0;">{{chart_caption}}</td>
        </tr>
      </table>
    </td>
  </tr>

# Chart brand colors — mirror flag/design-system/TOKENS.md. A chart
# MUST use only the colors below; anything else reads as off-brand
# next to the rest of the email. Keys are machine-readable so the
# Python chart code can `import yaml` and look them up by name.
chart_colors:
  background: "#FAFAFA"        # matches email-container body bg — chart blends into the email
  primary_series: "#7272AB"    # Glaucous / flag color.primary — historical / actual line
  secondary_series: "#9DA7EF"  # flag color.accent — forecast / projection line (use linestyle="--")
  band_fill: "#D7DEEE"         # confidence-interval shaded region (use alpha=0.5)
  band_edge: "#BFCBE5"         # confidence-interval edge stroke if needed (alpha=0.6)
  grid: "#E6EBF5"              # horizontal gridlines (subtle; xaxis grid OFF)
  axis: "#D7DEEE"              # left + bottom spines and tick marks
  text: "#586F7C"              # all axis labels, tick labels, legend text
  text_strong: "#141824"       # optional in-image annotation; prefer the HTML kicker instead
  positive_marker: "#1C5A33"   # annotation-only: up-trend dot (matches Opportunity callout)
  negative_marker: "#7C1F1F"   # annotation-only: down-trend dot (matches Risk callout)

# Matplotlib rendering contract — the Python protocol code that
# produces the PNG MUST follow this template. rcParams pin the global
# colors and typography; per-call kwargs pin series colors and styles.
#
#   import matplotlib as mpl
#   import matplotlib.pyplot as plt
#
#   mpl.rcParams.update({
#       "figure.facecolor": "#FAFAFA",
#       "axes.facecolor":   "#FAFAFA",
#       "axes.edgecolor":   "#D7DEEE",
#       "axes.labelcolor":  "#586F7C",
#       "axes.titlecolor":  "#141824",
#       "xtick.color":      "#586F7C",
#       "ytick.color":      "#586F7C",
#       "grid.color":       "#E6EBF5",
#       "grid.linewidth":   0.8,
#       "legend.frameon":   False,
#       "font.family":      "DejaVu Sans",   # ships with matplotlib; brand-safe sans fallback
#       "font.size":        9,
#   })
#
#   fig, ax = plt.subplots(figsize=(5.44, 2.2), dpi=200)   # → 1088×440 PNG
#
#   # Historical / actual series (solid, primary brand color)
#   ax.plot(hist_dates, hist_values,
#           color="#7272AB", linewidth=1.8,
#           marker="o", markersize=4,
#           markerfacecolor="#7272AB", markeredgecolor="#7272AB",
#           label="Actual")
#
#   # Forecast series (dashed, accent color)
#   ax.plot(fc_dates, fc_values,
#           color="#9DA7EF", linewidth=1.8, linestyle="--",
#           marker="o", markersize=4,
#           markerfacecolor="#9DA7EF", markeredgecolor="#9DA7EF",
#           label="Forecast")
#
#   # Confidence band (translucent lavender fill)
#   ax.fill_between(fc_dates, fc_low, fc_high,
#                   color="#D7DEEE", alpha=0.5, linewidth=0,
#                   label="Confidence band")
#
#   # Spines: hide top + right, keep left + bottom in border color
#   ax.spines["top"].set_visible(False)
#   ax.spines["right"].set_visible(False)
#   ax.spines["left"].set_color("#D7DEEE")
#   ax.spines["bottom"].set_color("#D7DEEE")
#
#   # Grid: horizontal only, behind data
#   ax.yaxis.grid(True)
#   ax.xaxis.grid(False)
#   ax.set_axisbelow(True)
#
#   # Ticks: align to data dates (MANDATORY — fixes the "drifted x-axis" bug)
#   ax.set_xticks(all_dates)
#   ax.set_xticklabels([d.strftime("%b %-d") for d in all_dates],
#                      rotation=0, fontsize=8)
#   ax.tick_params(axis="both", length=0)    # drop tick marks, keep labels
#
#   # Currency-formatted y-axis with no $0 clutter on the bottom edge
#   ax.yaxis.set_major_formatter(
#       mpl.ticker.FuncFormatter(lambda v, _: f"${v/1000:,.0f}k")
#   )
#
#   ax.legend(loc="upper left", fontsize=8, labelcolor="#586F7C")
#
#   plt.savefig(buf, format="png", dpi=200, bbox_inches="tight",
#               facecolor=fig.get_facecolor())

# =============================================================================
# SHARE-OF-TOTAL BAR (supplemental component — table cell pattern)
# Renders a proportional horizontal bar plus the numeric percentage
# inside a single <td> of a .data-table. Uses nested tables (not
# <div>) so Outlook respects the bar width.
# =============================================================================

share_of_total_bar_html: |
  <!-- This is the INNER content of a <td>. The enclosing <td> still
       carries the data-table cell styling (background, padding, etc.)
       and the column width on its <th> determines the bar's max width. -->
  <span class="mobile-label" style="display:none; font-size:0; line-height:0; max-height:0; overflow:hidden;">Share of Total</span>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="width:100%; border-collapse:collapse;">
    <tr>
      <td style="background-color:#E6EBF5; height:8px; line-height:8px; font-size:0;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;" width="{{share_pct_int}}%">
          <tr>
            <td style="background-color:#7272AB; height:8px; line-height:8px; font-size:0;">&nbsp;</td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
  <div style="font-size:12px; line-height:16px; color:#586F7C; margin-top:4px;">{{share_pct_label}}</div>

# Substitution values for share_of_total_bar_html:
#   {{share_pct_int}}   : integer 0-100, drives the bar width (e.g. 63 for 63.6%).
#   {{share_pct_label}} : display string (e.g. "63.6%"). Render exactly one decimal.

# =============================================================================
# RENDERING
# Follow these steps in order.
# =============================================================================

rendering:
  build:
    - Load this file for canonical_template and rules.
    - "Resolve theme — default is 'victoria'. Load
      protocols/email_styles/themes/<theme_id>.yaml."
    - Identify which sections the workflow requires (e.g. required_sections_in_order).
    - "Build HTML: (a) copy HEAD + outer structure verbatim, (b) copy HEADER +
      STATUS BAR and substitute {{placeholders}}, (c) compose body from pattern
      components to match workflow sections, (d) add CTA only if workflow
      requests it, (e) add FOOTER."
    - Apply theme color_overrides as literal hex find-replace (case-insensitive).
    - Strip all HTML comments.
  verify:
    - No {{...}} or ${...} tokens remain.
    - No example data from the template remains.
    - One HTML document — no duplicate rendering.
    - Every data-table tbody <td> has a mobile-label span.
    - No internal implementation details visible to recipient (see privacy below).
  send:
    - "If HTML > 50 KB, write to temp file and use content_file= parameter."
    - "Call mcp_sendgrid_send_email with content_type='text/html'."

# =============================================================================
# THEMES
# Hex find-replace maps applied to canonical_template.
# See protocols/email_styles/README.md for the full palette-to-role mapping
# and instructions on creating new themes.
# =============================================================================

themes:
  dir: "protocols/email_styles/themes"
  default: "victoria"
  discovery: "List themes.dir — each .yaml filename stem is a theme_id."

# =============================================================================
# CONSTRAINTS
# =============================================================================

constraints:
  layout:
    - "Table-first layout for all structural regions — no flex/grid."
    - "No external CSS, scripts, web fonts, forms, iframe, video, or canvas."
    - "Single-column body, 600px max-width."
  css:
    safe: "background-color, color, font-family, font-size, font-weight, line-height,
           padding, margin, border, border-collapse, text-align, vertical-align,
           width, max-width, text-transform, letter-spacing, display:inline-block"
    avoid: "Gradients, box shadows, opacity-dependent text, background images,
            position-based layout, rounded corners on Outlook containers,
            relying on dark-mode inversion for contrast."
  colors:
    - "Explicit inline text + background colors on every critical block."
    - "Dark header + light body by default. No transparent backgrounds on text."
    - "Prefer off-whites (#F4F6FB, #FAFAFA) over #FFFFFF; dark greys (#141824) over #000."
    - "Contrast: 4.5:1 normal text, 3.0:1 large text."
  privacy:
    rule: "Email body MUST NOT expose internal details — no theme names,
           no 'SendGrid', no 'MCP', no agent reasoning or instruction-conflict notes."
    allowed: "'Generated by Victoria' in footer and brand names as identity."
  attachments:
    max_per_file_mb: 25
    max_total_mb: 30

# =============================================================================
# CANONICAL TEMPLATE
#
# MIRRORED from flag/design-system/email-safe.html — do not hand-edit.
#
# This is a PATTERN REFERENCE with sample data. Each section is marked with
# an HTML comment header (e.g. <!-- HEADER -->) matching the components table
# above. The agent copies fixed sections verbatim and uses pattern sections
# as building blocks.
# =============================================================================

canonical_template: |
  <!DOCTYPE html>
  <html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
    <head>
      <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta name="color-scheme" content="light dark">
      <meta name="supported-color-schemes" content="light dark">
      <title>Elcano Email-Safe Theme Reference</title>
      <!--[if mso]>
      <xml>
        <o:OfficeDocumentSettings>
          <o:AllowPNG/>
          <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
      </xml>
      <![endif]-->
      <style>
        /* Mobile-responsive overrides — email clients that support <style> */
        @media only screen and (max-width: 480px) {
          .email-container { width: 100% !important; }
          .header-pad, .body-pad, .footer-pad { padding-left: 16px !important; padding-right: 16px !important; }
          .status-pad { padding-left: 16px !important; padding-right: 16px !important; }
          .table-pad { padding-left: 12px !important; padding-right: 12px !important; }
          .header-kicker, .header-date { font-size: 11px !important; }
          .header-subject { font-size: 18px !important; line-height: 24px !important; }
          .header-meta { font-size: 13px !important; line-height: 19px !important; }
          .data-table { width: 100% !important; max-width: 100% !important; border: 0 !important; border-collapse: separate !important; border-spacing: 0 !important; table-layout: fixed !important; }
          .data-table thead { display: none !important; }
          .data-table tbody, .data-table tr, .data-table td { display: block !important; width: 100% !important; }
          .data-table tr { width: 100% !important; margin-bottom: 12px !important; }
          .data-table tr:last-child { margin-bottom: 0 !important; }
          .data-table td { box-sizing: border-box !important; background-color: #FAFAFA !important; font-size: 15px !important; line-height: 20px !important; padding: 8px 10px !important; text-align: left !important; border-left: 1px solid #D7DEEE !important; border-right: 1px solid #D7DEEE !important; border-bottom: 1px solid #E6EBF5 !important; }
          .data-table td:first-child { border-top: 1px solid #D7DEEE !important; }
          .data-table td:last-child { border-bottom: 0 !important; }
          .data-table tr td:last-child { border-bottom: 1px solid #D7DEEE !important; }
          .data-table .campaign-name { background-color: #EEF3FF !important; font-weight: 700 !important; }
