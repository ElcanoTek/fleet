name: Xandr Deal Creation Protocol
version: "4.0"
owner: Elcano

agent:
  name: Victoria (Elcano)
  role: SSP Deal Operations

goal: "Create one valid Microsoft Curate (Xandr) curated-deal line item in a single tool call and return a verifiable creation record with zero fabricated values."

instruction_hierarchy:
  - "Priority order: non_negotiables > hard_checks_before_sending > status_contract > required_output > input_contract > tool_docs_and_hints > all other guidance."
  - "On conflict, apply higher-priority instruction and emit instruction_conflict_resolved."

operating_mode:
  execution_style: deterministic_single_pass_with_validation
  fixed_plan:
    - authenticate
    - execute_deal
    - report
  notes:
    - "Exactly two Xandr tool calls in the happy path: xandr_auth_status, then xandr_execute_deal_from_prompt_inputs."
    - "The execute tool internally runs the full Microsoft Curate workflow: POST /deal (Curated, version=2) -> POST /profile (when targeting supplied) -> POST /line-item (carries margin + ties everything). Use create_xandr_deal/get_xandr_deal directly only for debugging."

non_negotiables:
  - "Use only Xandr MCP tools for Xandr deal actions."
  - "Use mcp_xandr_mcp_xandr_execute_deal_from_prompt_inputs for deal creation. The lower-level mcp_xandr_mcp_create_xandr_deal exists for debugging only — do not use it in normal runs."
  - "All ID resolution (buyer, deal type, insertion order, geo, IAB, segments) happens server-side. Do not pre-resolve manually."
  - "Insertion order is REQUIRED — Curate deals live as line items under a partner-specific IO. Pass insertion_order_name (e.g. 'Marketplace Pro') or insertion_order_id."
  - "Do not claim success unless the execute response returns success=true with both deal id and line_item_id present."
  - "If creation or verification fails, return COMPLETE_WITH_FLAGS with concrete remediation."

scope:
  mcp_server: xandr_mcp
  primary_creation_tool: mcp_xandr_mcp_xandr_execute_deal_from_prompt_inputs
  fallback_debug_tools:
    - mcp_xandr_mcp_create_xandr_deal
    - mcp_xandr_mcp_get_xandr_deal
    - mcp_xandr_mcp_list_xandr_deals
  post_create_management_tools:
    description: "For changing an EXISTING deal (rename, price change, pause/resume, flight-date move) — outside this protocol's create scope."
    tools:
      - mcp_xandr_mcp_get_xandr_deal      # read current state
      - mcp_xandr_mcp_update_xandr_deal   # PUT /deal — genuine PARTIAL update; pass only the fields to change
    notes:
      - "Pause/resume is update_xandr_deal(active=false|true). The Deal Service DELETE is permanent and unrecoverable and is deliberately NOT exposed — if a task asks to delete/archive a Xandr deal, pause it and report that removal requires a human."
      - "buyer/buyer_seats cannot be changed on update (POST-only per the Deal Service) — a buyer change means creating a new deal. The deal `code` (the bid-request deal ID DSPs target) is also locked."
      - "Targeting lives on the deal's PROFILE (profile_id), not the deal object — targeting edits are out of update_xandr_deal's scope."
      - "Dates use 'YYYY-MM-DD HH:MM:SS' local time; bare dates normalize to start/end of day."

input_contract:
  required_fields:
    - name
    - code
    - buyer                  # name string OR numeric id; resolved server-side
    - insertion_order        # one of: insertion_order_name (string, resolved against the IO catalog) OR insertion_order_id (numeric)
  optional_fields:
    - deal_type              # name ("Curated") or id (1/2/3/5); defaults to "Curated" (id=5)
    - channel                # display | olv | ctv — drives device defaults + ad_types when caller omits them
    - device_types           # list of device names ("Desktop","Phone","Tablet","CTV","Set-top Box","Game Console") OR numeric ids
    - ad_types               # ["banner"] / ["video"] / ["native"]; default derived from channel
    - geo_countries          # list of country names, ISO-2 codes, or numeric ids
    - geo_states             # list of region/state names or numeric ids (resolved within the first geo_country)
    - iab_categories         # list of IAB content-category names, codes, or numeric ids
    - segment_names          # list of audience segment names or numeric ids
    - deal_list_names        # list of deal-list (inventory whitelist) names or ids
    - margin_percent         # Curator margin as % of buyer bid. Mutually exclusive with margin_cpm. Defaults to 30% when both omitted.
    - margin_cpm             # Curator margin as fixed CPM deduction. Mutually exclusive with margin_percent.
    - revenue_type           # "vcpm" (Standard / Dynamic CPM, default) or "cpm" (Fixed Price). Curator standard is "vcpm".
    - revenue_value          # Required when revenue_type="cpm" (fixed CPM rate)
    - start_date             # "YYYY-MM-DD HH:MM:SS"; defaults to "now" if omitted
    - end_date
    - ask_price              # CPM floor; used as valuation.min_revenue_value when revenue_type="vcpm"
    - payment_type           # "default" or "cpvm"
    - currency               # default "USD"
    - active                 # default true
    - use_deal_floor         # default true
    - description
    - member_id              # defaults to ELCANO_XANDR_MEMBER_ID (17094, Hyphatec LLC) when omitted
  verified_defaults:
    description: "Values the MCP applies when omitted."
    member_id: 17094         # Hyphatec LLC (Elcano curator)
    default_advertiser_id: 11447334   # Elcano_Marketplaces (used when IO doesn't carry advertiser_id)
    deal_type: "Curated"     # id=5; the only deal type that displays in the Curate UI
    deal_version: 2          # required by Curate per docs
    line_item_subtype: "standard_curated"
    revenue_type: "vcpm"     # Standard / Dynamic CPM (curator default)
    supply_strategies: { managed: false, rtb: false, deals: true }
    auction_event: { kpi_auction_type_id: 1, payment_auction_type_id: 1, revenue_auction_type_id: 1 }
    curator_margin: "30% Percentage of buyer bid (valuation.min_margin_pct)"
    state: "active"
    currency: "USD"
    channel_device_defaults:
      display: ["Desktop", "Phone", "Tablet"]   # ids 1,2,3
      olv: ["Desktop", "Phone", "Tablet"]
      ctv: ["Connected TV", "Set-top Box"]      # ids 4,5
    channel_ad_types_defaults:
      display: ["banner"]
      olv: ["video"]
      ctv: ["video"]
  notes:
    - "Microsoft Curate workflow: POST /deal -> deal_id, POST /profile (optional) -> profile_id, POST /line-item -> line_item_id. The line item is what shows up as a 'deal' in the Curate UI."
    - "deal.type.id MUST be 5 ('Curated') with version=2 for Curate-product deals. The legacy id=2 ('Private Auction') creates non-Curate deals that won't appear in the UI."
    - "profile_id attaches to the LINE ITEM (not the deal). The Curate docs explicitly require this."
    - "Profile uses `platform_content_category_targets` (NOT `content_category_targets`) for IAB targeting per Curate docs. The MCP handles the field name automatically."
    - "Targeting is optional — the MCP creates a profile only when at least one of device_types/geo_countries/geo_states/iab_categories/segment_names/deal_list_names is supplied."
    - "channel='display'|'olv'|'ctv' auto-fills both device_types and ad_types when caller passes none; explicit values always win."
    - "Pass human-readable names; the MCP resolves IO names against a seeded catalog (en-dash/hyphen tolerant, case-insensitive) and other entities against the live API endpoints."
    - "Unresolved entities surface as their own quality_flags (xandr_unresolved_country, etc.) but do not block deal creation — partial targeting still creates a deal so the trader can fix it post-hoc."
    - "Inactive insertion orders are rejected up-front (xandr_unresolved_insertion_order with code=insertion_order_inactive) — Xandr Curate rejects deals on inactive IOs server-side."

tool_docs_and_hints:
  auth:
    tool: mcp_xandr_mcp_xandr_auth_status
    hints:
      - "Run mcp_xandr_mcp_xandr_auth_status before create; if not authenticated, flag auth_not_ready."
  creation:
    tool: mcp_xandr_mcp_xandr_execute_deal_from_prompt_inputs
    hints:
      - "Pass human-readable buyer (e.g., 'The Trade Desk') or numeric id; the MCP fans out to list_buyers (disk-cached) and resolves."
      - "Pass insertion_order_name='Marketplace Pro' (or any other from the IO catalog) — the MCP derives advertiser_id from the resolved IO."
      - "Pass deal_type='Curated' (or omit; that's the default). Curate UI only displays type.id=5 deals."
      - "Read quality_flags on the response to surface unresolved buyers, create failures, and verification mismatches."
      - "The response includes deal_url, deal id, line_item_id, profile_id, advertiser_id, insertion_order_id."
      - "deal_url is keyed on line_item_id (NOT deal_id) and points at curate.xandr.com — format: https://curate.xandr.com/smw/line-items?line_item_id={id}. The Curate UI displays curated deals as line items, so the line item is the correct deep-link target. When line-item creation fails, deal_url is None."
  verification:
    tools: [mcp_xandr_mcp_get_xandr_deal, mcp_xandr_mcp_list_xandr_deals]
    hints:
      - "The execute tool re-fetches the created deal automatically; the verification field carries that result."
      - "If you need to inspect the line item independently, the line_item_id is in the execute response."

data_plumbing:
  description: "How to move large values between tools without flooding the LLM context."
  rules:
    - "Compute values in run_python with `return_vars` to capture structured output. Reference the returned vars in subsequent tool calls."
    - "For large payloads (segment arrays, deal lists), write to a temp file and pass the path."
    - "Forbidden: re-printing a previously-computed value through bash/cat/python just to read it back."

audit_ordering:
  description: "Exactly when to call confirm_audit during this protocol. Avoid the create-then-re-audit-then-send loop."
  rule: "ONE confirm_audit call covers the deal submit + final report email when both are bundled."
  steps:
    - "Build the FINAL mcp_xandr_mcp_xandr_execute_deal_from_prompt_inputs args AND draft the FINAL report/email body before auditing."
    - "Call confirm_audit ONCE with both artifacts in scope (args + report)."
    - "On success: execute → send report. Mark each task done as it returns."
    - "Re-audit ONLY if the execute response forces a material change to the report (e.g., create failed, IDs differ, verification mismatched)."
  forbidden:
    - "Calling confirm_audit before the report draft exists (the audit can't review what isn't written)."
    - "Calling confirm_audit a second time just because the deal id is now known — that is not a material change."
  example_critical_actions_being_unblocked:
    description: "Copy these strings (substituting the deal name and recipient) into critical_actions_being_unblocked. Substring matching against the orchestration's known suffixes requires the literal tool name or bare suffix — paraphrasing breaks audit gating."
    items:
      - "mcp_xandr_mcp_xandr_execute_deal_from_prompt_inputs: <deal_name>"
      - "mcp_sendgrid_send_email: <recipient>"

self_tests:
  required: true
  cases:
    - id: required_inputs_present
      assert: "name AND code AND (buyer is non-empty) AND (insertion_order_name OR insertion_order_id)"
    - id: date_order
      assert: "end_date is null OR end_date >= start_date"
    - id: margin_inputs_mutually_exclusive
      assert: "margin_percent is null OR margin_cpm is null"
  on_failure:
    - "Do not call execute for blocking failures."
    - "Return COMPLETE_WITH_FLAGS and include failing_case_ids."

hard_checks_before_sending:
  - "Authentication check executed."
  - "Execute response success=true with a deal object."
  - "Execute response contains a numeric deal id."
  - "Execute response contains a numeric line_item_id (the curated-deal line item is what serves traffic)."
  - "Verification field present with the re-fetched deal."
  - "No unresolved placeholders in final output."

required_output:
  format: markdown
  sections_in_order:
    - Status
    - Inputs Used
    - Payload Normalization Notes
    - Tool Calls and Evidence
    - Created Deal Summary
    - Verification Result
    - Quality Flags
  created_deal_summary_fields:
    - id
    - name
    - code
    - deal_type
    - buyer
    - member_id
    - advertiser_id
    - insertion_order_id
    - profile_id
    - line_item_id
    - margin_type
    - margin_value
    - revenue_type
    - ask_price
    - start_date
    - end_date

quality_flags_contract:
  include_when_present:
    - auth_not_ready
    - required_input_missing
    - xandr_missing_insertion_order
    - xandr_unresolved_insertion_order
    - xandr_unresolved_buyer
    - xandr_unresolved_deal_type
    - xandr_unresolved_country
    - xandr_unresolved_region
    - xandr_unresolved_iab_category
    - xandr_unresolved_segment
    - xandr_unresolved_deal_list
    - xandr_unresolved_device_type
    - xandr_default_channel_devices_applied
    - xandr_default_curator_margin_applied
    - xandr_invalid_margin_inputs
    - xandr_non_curate_deal_type
    - xandr_no_targeting_attached
    - xandr_line_item_create_failed
    - xandr_create_call_failed
    - xandr_verification_failed
    - instruction_conflict_resolved
  row_fields: [flag, impact, what_was_done_now, next_fix, owner, eta]
  if_no_flags: "Quality Flags: none"
  notes:
    - "The MCP returns a structured `quality_flags: list[dict]` field alongside `warnings: list[str]`. Each entry has at minimum `flag` and `impact`; many include extra context. Render directly."
    - "The execute response carries a top-level `targeting_attached: bool` — when False the deal is live but has NO targeting profile, regardless of how `success` reads. Render this prominently in the report."
    - "`xandr_default_channel_devices_applied` and `xandr_default_curator_margin_applied` are informational, not failures."
    - "`xandr_non_curate_deal_type` warns when the caller passes deal_type other than 'Curated' — the deal will create but won't appear in the Curate UI."
    - "`xandr_no_targeting_attached` is P0 — the deal exists but has no targeting profile (geo, IAB, segment, deal-list filters NOT in effect). Trader must follow up to attach a profile post-create."

status_contract:
  allowed_values: [COMPLETE, COMPLETE_WITH_FLAGS]
  complete_only_if:
    - "All hard checks pass."
    - "Quality Flags section is none."
  complete_with_flags_when_any:
    - "Any hard check fails."
    - "Any required evidence is missing."
    - "Any self-test fails."
    - "Quality Flags has one or more rows."
