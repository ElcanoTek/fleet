# golangci-lint v2 configuration
# https://golangci-lint.run/docs/configuration/
#
# CI pins golangci-lint to v2.12.2 (see .github/workflows/ci.yml:
# golangci/golangci-lint-action `version: v2.12.2`). Keep these in sync so a
# local `golangci-lint run` matches CI exactly — drifting the binary version
# can surface or hide findings and make the full-gate flap.
version: "2"

linters:
  # Use standard as the base set of linters
  default: standard
  enable:
    # Additional linters beyond standard
    - bodyclose
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nilerr
    - noctx
    - nolintlint
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace
  disable:
    # Disabled linters (too strict or not needed)
    - depguard
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - lll
    - wsl
    # dupl: large parts of this monorepo are deliberate, verbatim ports of the
    # same logic across the chat / sched / cutlass surfaces (and from sibling
    # repos). Those duplicates are intentional and reviewed; dupl only produces
    # noise here, so it is disabled rather than blanket-suppressed.
    - dupl
    # goconst: produced 100+ findings, the vast majority of which are short,
    # locally-meaningful literals (HTTP verbs, "text"/"success" tags, MIME
    # types, single-word case labels) where a package-level constant would hurt
    # readability more than the repetition does. The handful that are genuinely
    # worth hoisting already have named constants nearby; chasing the rest to
    # zero is churn, so goconst is disabled for the full-clean gate.
    - goconst
  settings:
    exhaustive:
      # Treat a switch with a default case as exhaustive. Every enum switch in
      # this tree that exhaustive flagged already routes the remaining values
      # through a deliberate default (e.g. TaskStatus.IsValidReportedStatus,
      # the stream-error classifiers), so a default IS the exhaustive handling.
      default-signifies-exhaustive: true
    gocyclo:
      # A few functions are legitimately branchy state machines (the agent
      # turn-loop, task validation, atomic status updates). Keep gocyclo ON but
      # set the cap just above them so it flags genuinely new complexity, not
      # these.
      min-complexity: 35
    nolintlint:
      # Every //nolint must carry an explanation and name the specific
      # linter(s) it suppresses, and unused suppressions are flagged so they
      # don't rot. This keeps the suppressions added during this cleanup honest.
      require-explanation: true
      require-specific: true
      allow-unused: false
  exclusions:
    # Use lax mode for generated files (ignores files with code generation comments)
    generated: lax
    warn-unused: true
    # Use preset exclusions for common patterns
    presets:
      - comments
      - std-error-handling
    # Custom exclusion rules
    rules:
      # web/node_modules vendors third-party Go (e.g. flatted's Go port) that we
      # neither own nor ship from the Go build; it only exists locally after an
      # `npm ci`. Never lint it. (CI's lint job doesn't run npm, so it's absent
      # there, but excluding it keeps local `golangci-lint run` matching CI.)
      - path: web/node_modules/
        linters:
          - exhaustive
          - gocyclo
          - govet
          - gosec
          - staticcheck
          - revive
          - errcheck
      # Exclude some linters from running on tests files
      - path: _test\.go
        linters:
          - dupl
          - gosec
          - goconst
          - errcheck
          # noctx: httptest.NewRequest (vs NewRequestWithContext) is idiomatic
          # in tests — these are synthetic requests with no cancellation
          # semantics, so threading a context through every one is pure churn.
          # The one production noctx (cmd/fleet-admin bootstrap) is fixed in
          # code via exec.CommandContext.
          - noctx
      # Exclude shadow checking for err variables (common pattern)
      - text: 'shadow: declaration of "err"'
        linters:
          - govet

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: strict

issues:
  # 0 = no cap. The CI lint job is a FULL gate (fails on ANY finding), so it
  # must surface every issue rather than truncating at 50/3 — a hidden finding
  # would still fail the build but be invisible in the log.
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

output:
  sort-order:
    - linter
    - file
  show-stats: true

run:
  timeout: 5m
  tests: true
  go: "1.26.4"
  # Lint the host-executor-enabled build so host.go (gated behind this tag, #159)
  # is covered. The release build excludes it; `go build ./...` in CI compile-checks
  # that untagged path. CI and local `golangci-lint run` agree because both read this.
  build-tags:
    - fleet_host_executor

severity:
  default: error
