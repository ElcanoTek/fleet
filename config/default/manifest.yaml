# Inline HTTP tools (issue #261). A lightweight alternative to an MCP server for
# simple "call this REST endpoint" tools: declare name + method + URL + an input
# JSON Schema inline, no subprocess required. Each entry is registered as a native
# tool the agent sees alongside MCP tools (addressed as mcp__http_<name>).
#
# These are bundle-author-defined and therefore TRUSTED, exactly like mcp_servers.
# SECURITY — the same credential boundary as an MCP server applies:
#   - headers values may carry ${ENV_VAR}; they are resolved from the HOST process
#     env and applied to the outbound request HOST-SIDE at call time. The secret
#     never enters the sandbox, the model context, or the logs. The model only
#     supplies the declared input params and sees the (redacted) response body.
#   - the request runs host-side through the SAME brokered seam every MCP tool call
#     funnels through (policy gate, output redaction, isError handling). There is no
#     per-tool sandbox enforcement and no streaming/OAuth/multipart support in V1.
#
# Behavior:
#   - {param} tokens in url (percent-encoded) and body_template (raw) are filled
#     from the model's input at call time.
#   - response_jq (optional) filters/transforms a JSON response before the model
#     sees it; it is syntax-checked at load. A non-JSON body is passed through.
#   - 30s timeout; redirects followed. A non-2xx response is returned to the model
#     as "status <N>: <body>" (so it can reason about the failure), not an error.
#   - critical: true opts the tool into the same audit/approval gate as
#     agent_policy.critical_tools — use it for tools that write data or have side
#     effects.
#
# The generic bundle ships NONE (the list is absent) so nothing changes by default.
# Example (commented out):
#
# http_tools:
#   - name: "get_jira_ticket"
#     description: "Look up a Jira ticket by ID and return its title, status, and description"
#     method: GET
#     url: "https://company.atlassian.net/rest/api/3/issue/{ticket_id}"
#     headers:
#       Authorization: "Basic ${JIRA_API_TOKEN}"
#       Content-Type: "application/json"
#     input_schema:
#       type: object
#       properties:
#         ticket_id:
#           type: string
#           description: "Jira ticket ID (e.g. PROJ-123)"
#       required: ["ticket_id"]
#     response_jq: ".fields | {summary, status: .status.name, description}"
#
#   - name: "post_slack_message"
#     description: "Post a message to a Slack channel"
#     method: POST
#     url: "https://slack.com/api/chat.postMessage"
#     headers:
#       Authorization: "Bearer ${SLACK_BOT_TOKEN}"
#       Content-Type: "application/json"
#     body_template: '{"channel": "{channel}", "text": "{message}"}'
#     critical: true
#     input_schema:
#       type: object
#       properties:
#         channel: { type: string }
#         message: { type: string }
#       required: ["channel", "message"]

# Inbound webhook-triggered conversations (issue #268). An external system
# (GitHub, Slack, CI) that presents a valid signature to POST /webhooks/{slug}
# starts a fresh conversation under notify_user, seeded from prompt_template
# rendered against the request payload. The turn runs through the SAME governed
# core (agentcore.Run) as any chat turn — an inbound I/O adapter, not a second
# agent loop. See docs/WEBHOOKS.md and docs/adr/0016-webhook-triggered-conversations.md.
#
# SECURITY — the trigger DEFINITION is operator-authored/trusted, but the inbound
# PAYLOAD is UNTRUSTED attacker input: it reaches the model as data (never as the
# template text), bounded by the mandatory sandbox, the chosen persona, the
# per-turn cost/iteration ceilings, and a per-slug rate limit. Authentication is
# by the HMAC / Slack signing secret (set exactly one of hmac_secret_env /
# token_secret_env); the secret value is read host-side and never enters the
# sandbox, the model, or the logs. An unknown slug and a bad signature return an
# identical, timing-equalized 401 (no slug enumeration).
#
# The generic bundle ships NONE (the list is absent) so the endpoint rejects
# every call by default. Example (commented out):
#
# webhook_triggers:
#   - slug: "github-pr-review"
#     description: "Triggered when a GitHub PR is opened"
#     hmac_secret_env: GITHUB_WEBHOOK_SECRET   # value comes from .env, auto-allowlisted
#     hmac_header: "X-Hub-Signature-256"       # optional; this is the default
#     persona: "code-reviewer"
#     model: "anthropic/claude-sonnet-4-6"     # optional; falls back to the server default
#     prompt_template: |
#       A pull request was opened: {{.payload.pull_request.title}}
#       URL: {{.payload.pull_request.html_url}}
#       Review it for correctness, security issues, and code quality.
#     notify_user: "brad@elcanotek.com"        # required: whose conversation this creates
#
#   - slug: "slack-requests"
#     description: "Triggered by a message in #fleet-requests"
#     token_secret_env: SLACK_SIGNING_SECRET   # Slack v0 signing secret (mutually exclusive with hmac_secret_env)
#     persona: "assistant"
#     prompt_template: "{{.payload.event.user}} asks: {{.payload.event.text}}"
#     notify_user: "brad@elcanotek.com"

# LLM provider routing (issue #289). By default fleet routes EVERY model through
# OpenRouter (set OPENROUTER_API_KEY and you're done — no providers: block needed).
# Declare providers: to route specific model slugs natively to Anthropic, OpenAI,
# or a self-hosted Ollama instead — for failover, data residency, or to avoid the
# OpenRouter markup. See docs/PROVIDERS.md and docs/adr/0017-multi-provider-llm.md.
#
# SECURITY — api_key_env names an env var; its VALUE is read HOST-SIDE at boot
# (auto-allowlisted from the manifest like an MCP credential) and never enters the
# manifest, the sandbox, the model context, or the logs.
#
# Routing precedence per slug: (1) explicit "<name>/<model>" when <name> is a
# provider name; (2) first provider whose models: list contains the slug (a listed
# model beats a catch-all wherever it sits); (3) first catch-all (empty models:).
#
# The generic bundle ships NO providers: block, so OpenRouter stays the sole
# provider. Example (commented out):
#
# providers:
#   - name: openrouter          # catch-all: any slug not matched below
#     type: openrouter
#     api_key_env: OPENROUTER_API_KEY
#   - name: anthropic-direct    # route these Claude slugs straight to Anthropic
#     type: anthropic
#     api_key_env: ANTHROPIC_API_KEY
#     models: ["claude-opus-4-8", "claude-sonnet-4-6"]
#   - name: openai-direct
#     type: openai
#     api_key_env: OPENAI_API_KEY
#     models: ["gpt-4o", "gpt-4o-mini"]
#   - name: local               # self-hosted Ollama (OpenAI-compatible; no key)
#     type: ollama
#     base_url: http://localhost:11434/v1
#     models: ["llama3.2", "qwen2.5-coder"]

# Agent tool-behavior policy. Client-specific (e.g. ad-tech DSP deal tools); the
# generic bundle ships NONE, so fleet stays on its base generic critical
# suffixes (send_email, send_template_email — always enforced regardless of this
# section). A client bundle overrides this with its full lists:
#   parallel_safe_tools:        fully-prefixed MCP tool names safe to run in
#                               parallel within one assistant turn.
#   critical_tools:             bare tool-name suffixes that require audit gating
#                               before execution (base email suffixes are added
#                               automatically — list only client-specific ones).
#   critical_tool_substitutes:  committed-suffix -> allowed executed substitute
#                               suffixes that may discharge the commitment.
#   critical_tool_timeouts:     OPTIONAL per-tool approval default-deny window
#                               (#225), keyed by the same bare tool-name suffix
#                               as critical_tools, in seconds. Highest-priority
#                               layer of the approval-timeout resolution chain
#                               (per-tool > per-conversation > the global
#                               FLEET_APPROVAL_TIMEOUT_SECONDS > 300s default).
#                               Omit it (as below) to use the global default for
#                               every tool. Example:
#                                 critical_tool_timeouts:
#                                   send_email: 600   # user reads the draft
#                                   bash: 60          # risky shell decides fast
agent_policy:
  parallel_safe_tools: []
  critical_tools: []
  critical_tool_substitutes: {}

# Custom model-pricing overrides (#297). Cost accounting normally trusts the USD
# figure OpenRouter returns per step. Operators on negotiated / enterprise rates
# (or a private model endpoint) pay a different price, so declare per-model rates
# here and Fleet prices matching steps LOCALLY from the token counts instead —
# which also makes the cost ceiling (FLEET_MAX_COST_USD) reflect real spend.
#
# Rates are per MILLION tokens (the unit pricing pages publish). Model slugs are
# matched case-insensitively against the active model. Omitting this block (as
# this generic bundle does) leaves cost accounting on the OpenRouter-returned
# price — identical to having no overrides at all.
#
#   overrides[]:
#     model:                              model slug to override (case-insensitive)
#     input_cost_per_million_tokens:      $/M for prompt (input) tokens
#     output_cost_per_million_tokens:     $/M for completion (output) tokens
#     cache_read_cost_per_million_tokens:  $/M for cache-read tokens (optional; 0)
#     cache_write_cost_per_million_tokens: $/M for cache-write tokens (optional; 0)
#   fallback:  what to do for a model NOT listed above —
#                openrouter  (default; trust the OpenRouter-returned cost)
#                zero        (suppress cost for unlisted models; private deploys)
#
# pricing:
#   fallback: openrouter
#   overrides:
#     - model: "anthropic/claude-opus-4-8"
#       input_cost_per_million_tokens: 7.50
#       output_cost_per_million_tokens: 22.50
#       cache_read_cost_per_million_tokens: 0.75
#       cache_write_cost_per_million_tokens: 1.875

empty_state:
  # Neutral example quick-start cards. The shape is the web's ProtocolPill — the
  # Go side passes these through to the browser as opaque JSON.
  cards:
    - id: "summarize"
      section: "Get started"
      type: "form"
      icon: "file-text"
      title: "Summarize a document"
      desc: "Paste or attach a document and get a concise summary."
      cta: "Summarize"
      fields:
        - key: "focus"
          label: "What should the summary focus on?"
          type: "text"
          placeholder: "key decisions, action items, risks…"
      promptTemplate: "Summarize the attached/pasted document."
    - id: "analyze-data"
      section: "Get started"
      type: "conversation"
      optionalForm: true
      icon: "bar-chart"
      title: "Analyze a dataset"
      desc: "Attach a CSV and ask questions — I'll run Python to dig in."
      cta: "Start analysis"
      starterPrompt: "I'd like to analyze a dataset. Ask me what you need to know, then load it with Python and walk me through what stands out."
    - id: "draft"
      section: "Get started"
      type: "form"
      icon: "edit"
      title: "Draft something"
      desc: "An email, a plan, a snippet of code — describe it and I'll draft it."
      cta: "Draft it"
      fields:
        - key: "what"
          label: "What should I draft?"
          type: "text"
          required: true
          placeholder: "a follow-up email to a client about…"
      promptTemplate: "Draft the following for me, and ask me anything you need first."
  protocol_pills: []

# Task templates — pre-filled scheduled-task configurations the Operations
# Center's task-create form offers as a starting point ("new task from a
# template", #262). Each entry carries a name/description/icon and a partial
# `task` payload that mirrors the EDITABLE subset of the POST /tasks request
# (internal/sched/models.TaskCreate): prompt, model, fallback_model,
# max_iterations, max_retries, recurrence, timezone, priority, allow_network,
# instruction_self_improve, persona, description, tags. Omitted keys leave the
# corresponding form field at its own default. Security-/routing-sensitive knobs
# (mcp_selection, credential_allowlist, loop_config, worktree_config,
# trigger_type, allow_task_creation) are deliberately NOT templatable — the user
# sets those explicitly — so a shipped template can never silently widen a task's
# authority. The task itself is always created through the ordinary create path;
# templates are read-only config exposed via GET /task-templates.
#
# A prompt may contain {variable} placeholders (e.g. {repo_path}); the API
# surfaces the placeholder names so the UI can prompt for values before applying
# the template. These five are NEUTRAL, generic starters (no client-specific
# content) so fleet is useful out of the box; a client bundle overrides this
# block with its own.
task_templates:
  - name: "Daily Standup"
    description: "Summarize recent activity into a morning standup update."
    icon: "📋"
    task:
      prompt: |
        Review recent git commits and any connected activity sources from the
        last working day. Write a concise standup update with three sections:
        what got done, what's planned next, and any blockers.
      model: "anthropic/claude-sonnet-4-6"
      recurrence: "0 8 * * 1-5"
      max_iterations: 15
      tags: ["daily", "standup"]
  - name: "Code Review"
    description: "Review the latest changes in a repo for bugs and security issues."
    icon: "🔍"
    task:
      prompt: "Review the latest git changes in {repo_path} for correctness bugs and security issues. Summarize findings by severity."
      model: "anthropic/claude-opus-4.8"
      fallback_model: "anthropic/claude-sonnet-4-6"
      max_iterations: 25
      tags: ["review", "code"]
  - name: "Weekly Report"
    description: "Friday end-of-day summary of accomplishments and next-week priorities."
    icon: "📊"
    task:
      prompt: "Compile a weekly report covering key accomplishments, notable metrics, and the top priorities for next week."
      model: "anthropic/claude-sonnet-4-6"
      recurrence: "0 17 * * 5"
      max_iterations: 20
      tags: ["weekly", "report"]
  - name: "Security Audit"
    description: "Periodic scan of dependencies and configuration for known issues."
    icon: "🔐"
    task:
      prompt: "Audit {repo_path} for dependency vulnerabilities and risky configuration. List each finding with its severity and a recommended fix."
      model: "anthropic/claude-opus-4.8"
      max_iterations: 30
      tags: ["security", "audit"]
  - name: "Test Generation"
    description: "Generate missing unit tests for a given package or file."
    icon: "🧪"
    task:
      prompt: "Generate unit tests for {target} covering the untested paths. Match the project's existing test style and keep each test focused."
      model: "anthropic/claude-opus-4.8"
      fallback_model: "anthropic/claude-sonnet-4-6"
      max_iterations: 25
      tags: ["tests"]
