# Generic client bundle — ships in fleet so the app runs bare with no
# client-specific content. A real deployment points FLEET_CLIENT_CONFIG_DIR at a
# checked-out client repo whose manifest overrides everything here.
#
# See internal/clientconfig and config/default/README.md for the bundle contract.

# The execution sandbox is a PER-CLIENT bundle artifact. This bundle ships its
# own sandbox/Containerfile (built on-box by scripts/build-sandbox-image.sh) and
# its own base-image digest pin (see sandbox/Containerfile). A client's
# XYZ-config bundle overrides this block with its own flavor.
#
#   containerfile: path (relative to this bundle) to the Containerfile to build.
#   tag:           local image tag to build/consume when building on-box (default).
#   image:         OPTIONAL prebuilt ref. If non-empty (e.g. a registry pull) it
#                  WINS over tag — that's the opt-in registry-publish path. Empty
#                  here => build-on-box default. Resolves via ${FLEET_SANDBOX_IMAGE}
#                  so an operator can point at a prebuilt image without editing the
#                  manifest; an explicit FLEET_SANDBOX_IMAGE in the process env
#                  always overrides regardless.
sandbox:
  containerfile: sandbox/Containerfile
  tag: localhost/fleet-sandbox:latest
  image: "${FLEET_SANDBOX_IMAGE:-}"

# Runtime flavors. fleet is an ACP client that drives each flavor as an ACP
# agent; native-inprocess is the fast in-process path kept as the default and
# the parity oracle. A flavor is selected per conversation / scheduled task (the
# chat + orchestrator flavor pickers).
#
#   type:             native-inprocess | native-acp | acp
#   image:            agent container image ref (native-acp / acp). Pin by digest
#                     in production; resolves ${VAR} via the manifest pass. The
#                     generic bundle uses the build-on-box native-agent tag,
#                     overridable via ${FLEET_NATIVE_AGENT_IMAGE}.
#   network:          restricted | none | model_only — the agent container's
#                     egress posture. native-acp needs model-endpoint egress
#                     (the loop runs in the agent); MCP creds are NEVER shipped
#                     into the container regardless (brokered host-side).
#   delegated_policy: containment tier for self-executing external flavors
#                     (governance: delegated). Native flavors leave it false
#                     (fully governed, identical to in-process native).
#   model_env:        for type: acp — the env var NAMES carrying the external
#                     PROVIDER's OWN model-endpoint credential(s). The host reads
#                     these from its environment and passes ONLY them into the
#                     locked agent container (the scrubbed env). fleet secrets
#                     and MCP credentials are NEVER shipped to an external agent.
#   args:             for type: acp — extra args appended to the agent container
#                     entrypoint (e.g. a bridge's `acp` subcommand).
#   default:          the flavor selected when none is chosen (at most one).
#
# External (type: acp) flavors are the CONTAINMENT tier (governance: delegated):
# the provider's agent self-executes inside a locked, model-only-egress sandbox
# and fleet observes (does not enforce) its self-report; session/request_permission
# is routed to a human (default-deny). See docs/USING-AGENTS.md for the full tier
# breakdown, the data-residency caveat, and a worked example. The provider images
# below need not exist in this generic bundle — a real XYZ-config bundle pins its
# own digests and supplies the model creds; this block documents the wiring.
runtimes:
  native-inprocess:
    type: native-inprocess
    display_name: "Native (in-process)"
    description: "Fast in-process loop. Dev/test/trusted-local; the parity oracle."
    default: true
  native-acp:
    type: native-acp
    image: "${FLEET_NATIVE_AGENT_IMAGE:-localhost/fleet-native-agent:latest}"
    network: restricted
    display_name: "Native (sandboxed)"
    description: "Native loop wrapped as a sandboxed ACP agent. Fully governed."
  # Claude Code as an external ACP agent, wired via the claude-agent-acp bridge
  # (https://github.com/zed-industries/claude-code-acp) baked into the provider
  # image. Self-executes in a locked sandbox; fleet contains + observes. The
  # bridge reads ANTHROPIC_API_KEY for the model endpoint — the only secret that
  # enters the container.
  claude-code:
    type: acp
    image: "${FLEET_CLAUDE_CODE_IMAGE:-localhost/fleet-claude-code:latest}"
    network: model_only
    delegated_policy: true
    model_env: ["ANTHROPIC_API_KEY"]
    display_name: "Claude Code (external)"
    description: "Anthropic Claude Code via the ACP bridge. Self-executing; containment tier."
    beta: true
  # Goose (https://github.com/block/goose) speaks ACP natively — `goose acp`.
  # Same containment tier. Goose-on-OpenRouter reads OPENROUTER_API_KEY; a
  # bundle targeting a different Goose provider lists that provider's key here.
  goose:
    type: acp
    image: "${FLEET_GOOSE_IMAGE:-localhost/fleet-goose:latest}"
    network: model_only
    delegated_policy: true
    model_env: ["OPENROUTER_API_KEY"]
    args: ["acp"]
    display_name: "Goose (external)"
    description: "Block's Goose via native ACP. Self-executing; containment tier."
    beta: true

branding:
  app_name: "Fleet"
  login_title: "Welcome aboard."
  login_tagline: "Sign in to your workspace and pick up where you left off."
  share_title: "Fleet — your team's AI workspace"
  share_description: "Persistent multi-turn conversations with real tool use across files, data, and the web."
  # Optional: theme the actual web UI (not just the text above) by overriding
  # globals.css custom properties per light/dark mode. Served as a
  # render-blocking stylesheet (chat-server /theme.css) so the shell — including
  # the pre-auth login page — paints in these colors with no flash. Omit the
  # block (as this generic bundle does) to keep the built-in palette. Themable
  # tokens: primary, primary_hover, secondary, accent, background, surface_1,
  # surface_2, text_primary, text_secondary, text_muted, border. Values are hex
  # or rgb()/rgba()/hsl()/hsla(); anything else is ignored and falls back.
  # colors:
  #   dark:
  #     primary: "#7272ab"
  #     accent: "#9da7ef"
  #     background: "#1a0b1e"
  #   light:
  #     primary: "#5f5f97"
  #     accent: "#7c84d6"
  #     background: "#f4f6fb"

# No client MCP servers in the generic bundle: the catalog is empty so fleet
# runs without any credentialed connectors. A client bundle declares its own
# mcp_servers[] here (see /root/elcano-config/manifest.yaml for a full example).
mcp_servers: []

# Agent tool-behavior policy. Client-specific (e.g. ad-tech DSP deal tools); the
# generic bundle ships NONE, so fleet stays on its base generic critical
# suffixes (send_email, send_template_email — always enforced regardless of this
# section). A client bundle overrides this with its full lists:
#   parallel_safe_tools:        fully-prefixed MCP tool names safe to run in
#                               parallel within one assistant turn.
#   critical_tools:             bare tool-name suffixes that require audit gating
#                               before execution (base email suffixes are added
#                               automatically — list only client-specific ones).
#   critical_tool_substitutes:  committed-suffix -> allowed executed substitute
#                               suffixes that may discharge the commitment.
#   allow_ungoverned_scheduled_agents:
#                               per-client opt-in (default false) that lets an
#                               EXTERNAL (type: acp / delegated_policy) flavor run
#                               as a SCHEDULED task at the CONTAINMENT tier. fleet
#                               is FAIL-CLOSED: with this off, a scheduled task that
#                               selects an external flavor is a LOUD ERROR at
#                               dispatch — never a silent fallback to a native
#                               flavor. The generic bundle leaves it false. See
#                               docs/USING-AGENTS.md ("Scheduled-external").
agent_policy:
  parallel_safe_tools: []
  critical_tools: []
  critical_tool_substitutes: {}
  allow_ungoverned_scheduled_agents: false

empty_state:
  # Neutral example quick-start cards. The shape is the web's ProtocolPill — the
  # Go side passes these through to the browser as opaque JSON.
  cards:
    - id: "summarize"
      section: "Get started"
      type: "form"
      icon: "file-text"
      title: "Summarize a document"
      desc: "Paste or attach a document and get a concise summary."
      cta: "Summarize"
      fields:
        - key: "focus"
          label: "What should the summary focus on?"
          type: "text"
          placeholder: "key decisions, action items, risks…"
      promptTemplate: "Summarize the attached/pasted document."
    - id: "analyze-data"
      section: "Get started"
      type: "conversation"
      optionalForm: true
      icon: "bar-chart"
      title: "Analyze a dataset"
      desc: "Attach a CSV and ask questions — I'll run Python to dig in."
      cta: "Start analysis"
      starterPrompt: "I'd like to analyze a dataset. Ask me what you need to know, then load it with Python and walk me through what stands out."
    - id: "draft"
      section: "Get started"
      type: "form"
      icon: "edit"
      title: "Draft something"
      desc: "An email, a plan, a snippet of code — describe it and I'll draft it."
      cta: "Draft it"
      fields:
        - key: "what"
          label: "What should I draft?"
          type: "text"
          required: true
          placeholder: "a follow-up email to a client about…"
      promptTemplate: "Draft the following for me, and ask me anything you need first."
  protocol_pills: []
